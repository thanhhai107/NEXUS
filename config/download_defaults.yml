  map_path: /v2/map/bounds
  networks: official
openweather:
  base_url: https://api.openweathermap.org
  units: metric
  lang: en
  include_one_call: true
  one_call_exclude: ''
  include_weather_overview: true
  include_day_summary: true
  include_history: false
  history_base_url: https://history.openweathermap.org
  history_chunk_days: 7
  include_current_weather_fallback: true
  include_air_pollution_current: true
  include_air_pollution_forecast: true
  write_air_pollution_index_scales: true
