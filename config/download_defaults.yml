tfl_line_status:
  inherits: tfl
  domain: transport
  subdomain: public_transport_status
  velocity: streaming
  ingestion_mode: polling_json
  poll_interval_sec: 300
  kafka_topic: nexus.raw.transport.tfl.line_status
  expected_format: json
  silver_outputs:
  - tfl_line_status
  - tfl_line_routes
  - tfl_line_disruptions
tfl_arrivals:
  inherits: tfl
  domain: transport
  subdomain: public_transport_arrivals
  velocity: streaming
  ingestion_mode: polling_json
  poll_interval_sec: 60
  kafka_topic: nexus.raw.transport.tfl.arrivals
  key_fields:
  - vehicleId
  - lineId
  - expectedArrival
  expected_format: json
  silver_outputs:
  - tfl_arrivals
  - tfl_arrival_predictions
tfl_live_traffic_disruptions:
  implemented: false
  adapter_status: planned
  enabled: true
  domain: transport
  subdomain: road_events
  velocity: streaming
  ingestion_mode: polling_xml
  poll_interval_sec: 300
  source_url: https://tfl.gov.uk/tfl/syndication/feeds/tims_feed.xml
  api_url: https://api.tfl.gov.uk/Road/all/Disruption
