# Governance Configuration

default:
  owner: data-platform
  steward: data-steward
  sensitivity: public
  retention:
    policy: open-data-standard
    days: 365
  access_policy:
    allowed_roles:
    - admin
    - steward
    - analyst
    - public
    denied_roles: []
    api_access: true
    trino_access: true
    superset_access: true

# Semantic annotation settings
semantic:
  llm_model: gpt-4o-mini
  llm_timeout_seconds: 180
  trigger:
    min_new_fields: 3
    reannotate_threshold: 10

# Quality rules settings
quality:
  quarantine_invalid_records: true
  validation_enabled: false
