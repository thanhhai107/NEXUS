# Spark defaults for NEXUS Iceberg + S3/MinIO.
# Values here are fallbacks — the spark-submit-wrapper.sh overrides them
# via --conf from environment variables (MINIO_ENDPOINT, MINIO_ROOT_USER, etc.).
# For permanent changes, set the corresponding env var instead of editing this file.

spark.sql.catalog.nexus=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nexus.type=hive
spark.sql.catalog.nexus.uri=thrift://hive-metastore:9083
spark.sql.catalog.nexus.warehouse=s3a://nexus-lakehouse/warehouse
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# S3A/MinIO — overridden by spark-submit-wrapper.sh from env vars:
#   MINIO_ENDPOINT       → spark.hadoop.fs.s3a.endpoint
#   MINIO_ROOT_USER      → spark.hadoop.fs.s3a.access.key
#   MINIO_ROOT_PASSWORD  → spark.hadoop.fs.s3a.secret.key
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=minioadmin
spark.hadoop.fs.s3a.secret.key=minioadmin
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.connection.ssl.enabled=false
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# Hive Metastore — overridden from HIVE_METASTORE_URI env var
hive.metastore.uris=thrift://hive-metastore:9083
