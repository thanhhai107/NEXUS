name: nexus

x-openmetadata-environment: &openmetadata-environment
  OPENMETADATA_CLUSTER_NAME: ${OPENMETADATA_CLUSTER_NAME:-nexus-openmetadata}
  SERVER_PORT: 8585
  SERVER_ADMIN_PORT: 8586
  LOG_LEVEL: ${OPENMETADATA_LOG_LEVEL:-INFO}
  AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
  AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.JwtFilter
  AUTHORIZER_ADMIN_PRINCIPALS: "${OPENMETADATA_AUTHORIZER_ADMIN_PRINCIPALS:-[admin]}"
  AUTHORIZER_ALLOWED_REGISTRATION_DOMAIN: "${OPENMETADATA_AUTHORIZER_ALLOWED_REGISTRATION_DOMAIN:-[\"all\"]}"
  AUTHORIZER_INGESTION_PRINCIPALS: "${OPENMETADATA_AUTHORIZER_INGESTION_PRINCIPALS:-[ingestion-bot]}"
  AUTHORIZER_PRINCIPAL_DOMAIN: ${OPENMETADATA_AUTHORIZER_PRINCIPAL_DOMAIN:-open-metadata.org}
  AUTHORIZER_ALLOWED_DOMAINS: "${OPENMETADATA_AUTHORIZER_ALLOWED_DOMAINS:-[]}"
  AUTHORIZER_ENFORCE_PRINCIPAL_DOMAIN: "false"
  AUTHORIZER_ENABLE_SECURE_SOCKET: "false"
  AUTHENTICATION_PROVIDER: basic
  AUTHENTICATION_RESPONSE_TYPE: id_token
  AUTHENTICATION_PUBLIC_KEYS: "${OPENMETADATA_AUTHENTICATION_PUBLIC_KEYS:-[http://localhost:8585/api/v1/system/config/jwks]}"
  AUTHENTICATION_AUTHORITY: https://accounts.google.com
  AUTHENTICATION_CLIENT_ID: ""
  AUTHENTICATION_CALLBACK_URL: ""
  AUTHENTICATION_JWT_PRINCIPAL_CLAIMS: "${OPENMETADATA_AUTHENTICATION_JWT_PRINCIPAL_CLAIMS:-[email,preferred_username,sub]}"
  AUTHENTICATION_JWT_PRINCIPAL_CLAIMS_MAPPING: "[]"
  AUTHENTICATION_ENABLE_SELF_SIGNUP: "true"
  AUTHENTICATION_CLIENT_TYPE: public
  RSA_PUBLIC_KEY_FILE_PATH: ./conf/public_key.der
  RSA_PRIVATE_KEY_FILE_PATH: ./conf/private_key.der
  JWT_ISSUER: open-metadata.org
  JWT_KEY_ID: ${OPENMETADATA_JWT_KEY_ID:-Gb389a-9f76-gdjs-a92j-0242bk94356}
  PIPELINE_SERVICE_CLIENT_ENDPOINT: http://openmetadata-ingestion:8080
  PIPELINE_SERVICE_CLIENT_HEALTH_CHECK_INTERVAL: 300
  SERVER_HOST_API_URL: http://openmetadata-server:8585/api
  PIPELINE_SERVICE_CLIENT_VERIFY_SSL: no-ssl
  PIPELINE_SERVICE_CLIENT_SSL_CERT_PATH: ""
  DB_DRIVER_CLASS: org.postgresql.Driver
  DB_SCHEME: postgresql
  DB_PARAMS: allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
  DB_USER: openmetadata_user
  DB_USER_PASSWORD: openmetadata_password
  DB_HOST: openmetadata-postgresql
  DB_PORT: 5432
  OM_DATABASE: openmetadata_db
  ELASTICSEARCH_HOST: openmetadata-elasticsearch
  ELASTICSEARCH_PORT: 9200
  ELASTICSEARCH_SCHEME: http
  ELASTICSEARCH_USER: ""
  ELASTICSEARCH_PASSWORD: ""
  SEARCH_TYPE: elasticsearch
  ELASTICSEARCH_TRUST_STORE_PATH: ""
  ELASTICSEARCH_TRUST_STORE_PASSWORD: ""
  ELASTICSEARCH_CONNECTION_TIMEOUT_SECS: 5
  ELASTICSEARCH_SOCKET_TIMEOUT_SECS: 60
  ELASTICSEARCH_KEEP_ALIVE_TIMEOUT_SECS: 600
  ELASTICSEARCH_BATCH_SIZE: 100
  ELASTICSEARCH_PAYLOAD_BYTES_SIZE: 10485760
  ELASTICSEARCH_INDEX_MAPPING_LANG: EN
  EVENT_MONITOR: prometheus
  EVENT_MONITOR_BATCH_SIZE: 10
  EVENT_MONITOR_PATH_PATTERN: '["/api/v1/tables/*", "/api/v1/health-check"]'
  EVENT_MONITOR_LATENCY: "[]"
  PIPELINE_SERVICE_CLIENT_ENABLED: "true"
  PIPELINE_SERVICE_CLIENT_CLASS_NAME: org.openmetadata.service.clients.pipeline.airflow.AirflowRESTClient
  PIPELINE_SERVICE_IP_INFO_ENABLED: "false"
  PIPELINE_SERVICE_CLIENT_HOST_IP: ""
  PIPELINE_SERVICE_CLIENT_SECRETS_MANAGER_LOADER: noop
  AIRFLOW_USERNAME: admin
  AIRFLOW_PASSWORD: admin
  AIRFLOW_TIMEOUT: 10
  AIRFLOW_TRUST_STORE_PATH: ""
  AIRFLOW_TRUST_STORE_PASSWORD: ""
  FERNET_KEY: ${OPENMETADATA_FERNET_KEY:-jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA=}
  SECRET_MANAGER: db
  OM_EMAIL_ENTITY: OpenMetadata
  OM_SUPPORT_URL: https://slack.open-metadata.org
  AUTHORIZER_ENABLE_SMTP: "false"
  OPENMETADATA_SERVER_URL: ""
  OPENMETADATA_SMTP_SENDER_MAIL: ""
  SMTP_SERVER_ENDPOINT: ""
  SMTP_SERVER_PORT: ""
  SMTP_SERVER_USERNAME: ""
  SMTP_SERVER_PWD: ""
  SMTP_SERVER_STRATEGY: SMTP_TLS
  OPENMETADATA_HEAP_OPTS: "${OPENMETADATA_HEAP_OPTS:--Xmx1G -Xms1G}"
  MASK_PASSWORDS_API: "false"
  WEB_CONF_URI_PATH: /api
  WEB_CONF_HSTS_ENABLED: "false"
  WEB_CONF_HSTS_MAX_AGE: 365 days
  WEB_CONF_HSTS_INCLUDE_SUBDOMAINS: "true"
  WEB_CONF_HSTS_PRELOAD: "true"
  WEB_CONF_FRAME_OPTION_ENABLED: "false"
  WEB_CONF_FRAME_OPTION: SAMEORIGIN
  WEB_CONF_FRAME_ORIGIN: ""
  WEB_CONF_CONTENT_TYPE_OPTIONS_ENABLED: "false"
  WEB_CONF_XSS_PROTECTION_ENABLED: "false"
  WEB_CONF_XSS_PROTECTION_ON: "true"
  WEB_CONF_XSS_PROTECTION_BLOCK: "true"
  WEB_CONF_XSS_CSP_ENABLED: "false"
  WEB_CONF_XSS_CSP_POLICY: "default-src 'self'"
  WEB_CONF_XSS_CSP_REPORT_ONLY_POLICY: ""
  WEB_CONF_CACHE_CONTROL: ""
  WEB_CONF_PRAGMA: ""

x-airflow-environment: &airflow-environment
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__SECRET_KEY: nexus-local-secret
  AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
  AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-db:5432/airflow
  NEXUS_GOVERNANCE_STORAGE: ${NEXUS_GOVERNANCE_STORAGE:-postgres}
  NEXUS_GOVERNANCE_DATABASE_URL: ${NEXUS_GOVERNANCE_DATABASE_URL:-postgresql://nexus_governance:nexus_governance@governance-db-primary:5432/nexus_governance}
  NEXUS_GX_ENABLED: ${NEXUS_GX_ENABLED:-true}
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
  KAFKA_TOPIC_TRANSPORT_EVENTS: ${KAFKA_TOPIC_TRANSPORT_EVENTS:-transport-events}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio-1:9000}
  NEXUS_BUCKET: ${NEXUS_BUCKET:-nexus-lakehouse}
  OPENLINEAGE_URL: ${OPENLINEAGE_URL:-}
  OPENLINEAGE_ENDPOINT: ${OPENLINEAGE_ENDPOINT:-/api/v1/lineage}
  OPENLINEAGE_NAMESPACE: ${OPENLINEAGE_NAMESPACE:-nexus}
  OPENLINEAGE_TIMEOUT_SECONDS: ${OPENLINEAGE_TIMEOUT_SECONDS:-5}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
  NEXUS_AGENT_MODEL: ${NEXUS_AGENT_MODEL:-gemini-2.5-flash}

x-host-access: &host-access
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  # =========================================================================
  # DISTRIBUTED INFRASTRUCTURE - Host networking (reachable across VMs)
  # =========================================================================
  zookeeper-1:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: nexus-zookeeper-1
    restart: unless-stopped
    network_mode: host
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: ${ZK_SERVERS}

  kafka-1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: nexus-kafka-1
    restart: unless-stopped
    network_mode: host
    depends_on:
      - zookeeper-1
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: ${ZK_CONNECT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${NEXUS_MASTER_PRIVATE_IP}:9092,PLAINTEXT_HOST://${NEXUS_MASTER_PRIVATE_IP}:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  minio-1:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: nexus-minio-1
    restart: unless-stopped
    network_mode: host
    command: server --console-address ":9001" ${MINIO_PEERS}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ${NEXUS_MINIO_VOLUME:-minio-data-1}:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: nexus-minio-init
    <<: *host-access
    depends_on:
      - minio-1
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      NEXUS_BUCKET: ${NEXUS_BUCKET:-nexus-lakehouse}
    entrypoint: >
      /bin/sh -c "
      until mc alias set nexus http://host.docker.internal:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb --ignore-existing nexus/$${NEXUS_BUCKET};
      mc anonymous set none nexus/$${NEXUS_BUCKET};
      "

  # =========================================================================
  # DATABASES - Bridge networking (master-only)
  # =========================================================================
  hive-metastore-db:
    image: postgres:16
    container_name: nexus-hive-metastore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore_db
    volumes:
      - hive-metastore-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-db:
    image: postgres:16
    container_name: nexus-airflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  governance-db-primary:
    image: postgres:16
    container_name: nexus-governance-db-primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus_governance
      POSTGRES_PASSWORD: nexus_governance
      POSTGRES_DB: nexus_governance
      POSTGRES_REPLICATION_PASSWORD: nexus_replication
    command: >
      -c wal_level=replica
      -c max_wal_senders=5
      -c max_replication_slots=5
      -c wal_keep_size=256
      -c hot_standby=on
    ports:
      - "5432:5432"
    volumes:
      - governance-db-data-primary:/var/lib/postgresql/data
      - ../../infra/docker/postgres/primary-init.sh:/docker-entrypoint-initdb.d/01-replication.sh
      - ../../infra/docker/postgres/pg_hba_append.sh:/docker-entrypoint-initdb.d/02-pg-hba.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_governance -d nexus_governance"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================================================
  # HIVE METASTORE - Bridge
  # =========================================================================
  hive-metastore:
    build:
      context: hive-metastore
    image: nexus-hive-metastore:4.0.0
    container_name: nexus-hive-metastore
    restart: unless-stopped
    <<: *host-access
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
        -Dhive.metastore.warehouse.dir=s3a://${NEXUS_BUCKET:-nexus-lakehouse}/warehouse
        -Dmetastore.warehouse.dir=s3a://${NEXUS_BUCKET:-nexus-lakehouse}/warehouse
        -Dmetastore.try.direct.sql.ddl=false
    ports:
      - "9083:9083"

  # =========================================================================
  # SPARK - Bridge
  # =========================================================================
  spark:
    build:
      context: spark
    image: nexus-spark:3.5
    container_name: nexus-spark
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - hive-metastore
      - minio-init
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      HOME: /tmp/nexus-spark-home
      HADOOP_USER_NAME: spark
      USER: spark
      LOGNAME: spark
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3.12
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3.12
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ../../:/opt/nexus

  spark-worker-1:
    image: nexus-spark:3.5
    container_name: nexus-spark-worker-local
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - spark
      - hive-metastore
      - minio-init
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark:7077
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2G}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-2}
      HOME: /tmp/nexus-spark-home
      HADOOP_USER_NAME: spark
      USER: spark
      LOGNAME: spark
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3.12
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3.12
    volumes:
      - ../../:/opt/nexus

  # =========================================================================
  # TRINO - Bridge
  # =========================================================================
  trino-coordinator:
    image: trinodb/trino:451
    container_name: nexus-trino-coordinator
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - hive-metastore
      - minio-init
    ports:
      - "8085:8080"
    volumes:
      - ../../serving/query/trino/coordinator/config.properties:/etc/trino/config.properties
      - ../../serving/query/trino/coordinator/node.properties:/etc/trino/node.properties
      - ../../serving/query/trino/catalog:/etc/trino/catalog
      - ../../serving/query/trino/access-control.properties:/etc/trino/access-control.properties
      - ../../serving/query/trino/rules.json:/etc/trino/rules.json

  trino-worker-1:
    image: trinodb/trino:451
    container_name: nexus-trino-worker-local
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - trino-coordinator
      - minio-init
    environment:
      NODE_ID: trino-worker-local
    volumes:
      - ../../serving/query/trino/worker/config.properties:/etc/trino/config.properties
      - ../../serving/query/trino/worker/node.properties:/etc/trino/node.properties
      - ../../serving/query/trino/catalog:/etc/trino/catalog

  # =========================================================================
  # AIRFLOW - Bridge
  # =========================================================================
  airflow:
    build:
      context: ../..
      dockerfile: infra/docker/airflow/Dockerfile
    image: nexus-airflow:2.9.1-python3.11
    container_name: nexus-airflow
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - airflow-db
      - governance-db-primary
      - hive-metastore
      - redis
      - minio-init
    environment:
      <<: *airflow-environment
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    command: >
      bash -c "airflow db migrate &&
      (airflow users create --username $${AIRFLOW_ADMIN_USERNAME} --password $${AIRFLOW_ADMIN_PASSWORD}
      --firstname Nexus --lastname Admin --role Admin --email admin@example.com || true &&
      true) &&
      airflow webserver"
    ports:
      - "8080:8080"
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../common:/opt/airflow/common
      - ../../config:/opt/airflow/config
      - ../../domains:/opt/airflow/domains
      - ../../ingestion:/opt/airflow/ingestion
      - ../../processing:/opt/airflow/processing
      - ../../infra:/opt/airflow/infra
      - ../../transform:/opt/airflow/transform
      - ../../governance:/opt/airflow/governance
      - ../../cli:/opt/airflow/cli
      - ../../assets:/opt/airflow/assets
      - ../../runtime:/opt/airflow/runtime

  airflow-scheduler-1:
    image: nexus-airflow:2.9.1-python3.11
    container_name: nexus-airflow-scheduler-1
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - airflow
      - airflow-db
      - redis
      - governance-db-primary
    environment:
      <<: *airflow-environment
    command: scheduler
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../common:/opt/airflow/common
      - ../../config:/opt/airflow/config
      - ../../domains:/opt/airflow/domains
      - ../../ingestion:/opt/airflow/ingestion
      - ../../processing:/opt/airflow/processing
      - ../../infra:/opt/airflow/infra
      - ../../transform:/opt/airflow/transform
      - ../../governance:/opt/airflow/governance
      - ../../cli:/opt/airflow/cli
      - ../../assets:/opt/airflow/assets
      - ../../runtime:/opt/airflow/runtime

  airflow-scheduler-2:
    image: nexus-airflow:2.9.1-python3.11
    container_name: nexus-airflow-scheduler-2
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - airflow
      - airflow-db
      - redis
      - governance-db-primary
    environment:
      <<: *airflow-environment
    command: scheduler
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../common:/opt/airflow/common
      - ../../config:/opt/airflow/config
      - ../../domains:/opt/airflow/domains
      - ../../ingestion:/opt/airflow/ingestion
      - ../../processing:/opt/airflow/processing
      - ../../infra:/opt/airflow/infra
      - ../../transform:/opt/airflow/transform
      - ../../governance:/opt/airflow/governance
      - ../../cli:/opt/airflow/cli
      - ../../assets:/opt/airflow/assets
      - ../../runtime:/opt/airflow/runtime

  airflow-worker-1:
    image: nexus-airflow:2.9.1-python3.11
    container_name: nexus-airflow-worker-local-1
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - airflow
      - airflow-db
      - redis
      - governance-db-primary
    environment:
      <<: *airflow-environment
    command: celery worker
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../common:/opt/airflow/common
      - ../../config:/opt/airflow/config
      - ../../domains:/opt/airflow/domains
      - ../../ingestion:/opt/airflow/ingestion
      - ../../processing:/opt/airflow/processing
      - ../../infra:/opt/airflow/infra
      - ../../transform:/opt/airflow/transform
      - ../../governance:/opt/airflow/governance
      - ../../cli:/opt/airflow/cli
      - ../../assets:/opt/airflow/assets
      - ../../runtime:/opt/airflow/runtime

  airflow-worker-2:
    image: nexus-airflow:2.9.1-python3.11
    container_name: nexus-airflow-worker-local-2
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - airflow
      - airflow-db
      - redis
      - governance-db-primary
    environment:
      <<: *airflow-environment
    command: celery worker
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../common:/opt/airflow/common
      - ../../config:/opt/airflow/config
      - ../../domains:/opt/airflow/domains
      - ../../ingestion:/opt/airflow/ingestion
      - ../../processing:/opt/airflow/processing
      - ../../infra:/opt/airflow/infra
      - ../../transform:/opt/airflow/transform
      - ../../governance:/opt/airflow/governance
      - ../../cli:/opt/airflow/cli
      - ../../assets:/opt/airflow/assets
      - ../../runtime:/opt/airflow/runtime

  # =========================================================================
  # SUPERSET - Bridge
  # =========================================================================
  superset:
    image: apache/superset:4.0.2
    container_name: nexus-superset
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - trino-coordinator
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-for-production}
    ports:
      - "8088:8088"
    volumes:
      - ../../serving/dashboards/superset:/app/pythonpath
      - superset-home:/app/superset_home
    command: >
      bash -c "superset db upgrade &&
      (superset fab create-admin --username ${SUPERSET_ADMIN_USERNAME:-admin}
      --firstname Nexus --lastname Admin --email admin@example.com
      --password ${SUPERSET_ADMIN_PASSWORD:-admin} || true) &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088"

  # =========================================================================
  # NEXUS API + LB - Bridge
  # =========================================================================
  api-1:
    build:
      context: ../..
      dockerfile: serving/api/Dockerfile
    container_name: nexus-api-1
    restart: unless-stopped
    <<: *host-access
    depends_on:
      - trino-coordinator
      - governance-db-primary
    environment:
      TRINO_HOST: trino-coordinator
      TRINO_PORT: 8080
      TRINO_USER: ${TRINO_USER:-nexus}
      NEXUS_GOVERNANCE_STORAGE: ${NEXUS_GOVERNANCE_STORAGE:-postgres}
      NEXUS_GOVERNANCE_DATABASE_URL: ${NEXUS_GOVERNANCE_DATABASE_URL:-postgresql://nexus_governance:nexus_governance@governance-db-primary:5432/nexus_governance}
    volumes:
      - ../../common:/app/common
      - ../../config:/app/config
      - ../../domains:/app/domains
      - ../../runtime:/app/runtime
      - ../../governance:/app/governance

  api-lb:
    image: nginx:alpine
    container_name: nexus-api-lb
    restart: unless-stopped
    depends_on:
      - api-1
    ports:
      - "8000:8000"
    volumes:
      - ../../runtime/nginx-api-lb.conf:/etc/nginx/nginx.conf:ro

  # =========================================================================
  # OpenMetadata (optional, via --profile metadata)
  # =========================================================================
  openmetadata-postgresql:
    profiles: ["metadata"]
    image: docker.getcollate.io/openmetadata/postgresql:1.12.6
    container_name: nexus-openmetadata-postgresql
    command: "--work_mem=10MB"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    expose:
      - "5432"
    volumes:
      - openmetadata-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -tAc 'select 1' -d openmetadata_db"]
      interval: 15s
      timeout: 10s
      retries: 10

  openmetadata-elasticsearch:
    profiles: ["metadata"]
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    container_name: nexus-openmetadata-elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms1024m -Xmx1024m"
      xpack.security.enabled: "false"
    ports:
      - "${OPENMETADATA_ELASTICSEARCH_PORT:-9201}:9200"
    volumes:
      - openmetadata-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health?pretty | grep status | grep -qE 'green|yellow' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  openmetadata-migrate:
    profiles: ["metadata"]
    image: docker.getcollate.io/openmetadata/server:1.12.6
    container_name: nexus-openmetadata-migrate
    command: "./bootstrap/openmetadata-ops.sh migrate"
    environment:
      <<: *openmetadata-environment
    depends_on:
      openmetadata-elasticsearch:
        condition: service_healthy
      openmetadata-postgresql:
        condition: service_healthy

  openmetadata-server:
    profiles: ["metadata"]
    image: docker.getcollate.io/openmetadata/server:1.12.6
    container_name: nexus-openmetadata-server
    restart: always
    environment:
      <<: *openmetadata-environment
    ports:
      - "${OPENMETADATA_SERVER_PORT:-8585}:8585"
      - "${OPENMETADATA_SERVER_ADMIN_PORT:-8586}:8586"
    depends_on:
      openmetadata-elasticsearch:
        condition: service_healthy
      openmetadata-postgresql:
        condition: service_healthy
      openmetadata-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8586/healthcheck"]

  openmetadata-ingestion:
    profiles: ["metadata"]
    image: docker.getcollate.io/openmetadata/ingestion:1.12.6
    container_name: nexus-openmetadata-ingestion
    depends_on:
      openmetadata-elasticsearch:
        condition: service_started
      openmetadata-postgresql:
        condition: service_healthy
      openmetadata-server:
        condition: service_started
    environment:
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__OPENMETADATA_AIRFLOW_APIS__DAG_GENERATED_CONFIGS: /opt/airflow/dag_generated_configs
      DB_HOST: openmetadata-postgresql
      DB_PORT: 5432
      AIRFLOW_DB: airflow_db
      DB_USER: airflow_user
      DB_SCHEME: postgresql+psycopg2
      DB_PASSWORD: airflow_pass
      DB_PROPERTIES: ""
    entrypoint: /bin/bash
    command:
      - /opt/airflow/ingestion_dependency.sh
    ports:
      - "${OPENMETADATA_INGESTION_PORT:-8090}:8080"
    volumes:
      - openmetadata-ingestion-dag-airflow:/opt/airflow/dag_generated_configs
      - openmetadata-ingestion-dags:/opt/airflow/dags
      - openmetadata-ingestion-tmp:/tmp

  marquez-db:
    profiles: ["metadata"]
    image: postgres:14
    container_name: nexus-marquez-db
    environment:
      POSTGRES_USER: ${MARQUEZ_DB_USER:-marquez}
      POSTGRES_PASSWORD: ${MARQUEZ_DB_PASSWORD:-marquez}
      POSTGRES_DB: ${MARQUEZ_DB_NAME:-marquez}
    volumes:
      - marquez-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  marquez:
    profiles: ["metadata"]
    image: marquezproject/marquez:${MARQUEZ_TAG:-0.51.1}
    container_name: nexus-marquez
    depends_on:
      marquez-db:
        condition: service_healthy
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${MARQUEZ_DB_NAME:-marquez}
      POSTGRES_USER: ${MARQUEZ_DB_USER:-marquez}
      POSTGRES_PASSWORD: ${MARQUEZ_DB_PASSWORD:-marquez}
      SEARCH_ENABLED: "false"
    ports:
      - "${MARQUEZ_PORT:-5000}:5000"
      - "${MARQUEZ_ADMIN_PORT:-5001}:5001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5001/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  marquez-web:
    profiles: ["metadata"]
    image: marquezproject/marquez-web:${MARQUEZ_TAG:-0.51.1}
    container_name: nexus-marquez-web
    depends_on:
      marquez:
        condition: service_started
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
      WEB_PORT: 3000
      REACT_APP_ADVANCED_SEARCH: "false"
    ports:
      - "${MARQUEZ_WEB_PORT:-3000}:3000"

volumes:
  minio-data-1:
  hive-metastore-db-data:
  airflow-db-data:
  governance-db-data-primary:
  superset-home:
  openmetadata-postgres-data:
  openmetadata-es-data:
  openmetadata-ingestion-dag-airflow:
  openmetadata-ingestion-dags:
  openmetadata-ingestion-tmp:
  marquez-db-data:
