name: nexus-worker

services:
  spark-worker:
    build:
      context: spark
    image: nexus-spark:3.5
    container_name: nexus-spark-worker
    restart: unless-stopped
    network_mode: host
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:?Set SPARK_MASTER_URL to spark://<master-private-ip>:7077}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2G}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-2}
      SPARK_WORKER_WEBUI_PORT: ${SPARK_WORKER_WEBUI_PORT:-8081}
      SPARK_LOCAL_DIRS: ${SPARK_LOCAL_DIRS:-/data/spark}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
      HIVE_METASTORE_URI: ${HIVE_METASTORE_URI:-}
      NEXUS_RUNTIME_MODE: ${NEXUS_RUNTIME_MODE:-vm}
      NEXUS_RUNTIME_DIR: ${NEXUS_RUNTIME_DIR:-/data}
      HOME: /tmp/nexus-spark-home
      HADOOP_USER_NAME: spark
      USER: spark
      LOGNAME: spark
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3.12
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3.12
    volumes:
      - ../../:/opt/nexus
      - ${NEXUS_RUNTIME_DIR:-/data}:/data
