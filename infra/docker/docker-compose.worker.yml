name: nexus-worker

services:
  # =========================================================================
  # ZooKeeper node (worker-1: id=2, worker-2: id=3)
  # =========================================================================
  zookeeper-2:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: nexus-zookeeper-2
    restart: unless-stopped
    network_mode: host
    environment:
      ZOOKEEPER_SERVER_ID: 2
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: ${ZK_SERVERS}
      ZOOKEEPER_ADMIN_SERVER_PORT: 8089

  zookeeper-3:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: nexus-zookeeper-3
    restart: unless-stopped
    network_mode: host
    environment:
      ZOOKEEPER_SERVER_ID: 3
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: ${ZK_SERVERS}
      ZOOKEEPER_ADMIN_SERVER_PORT: 8089

  # =========================================================================
  # Kafka broker (worker-1: id=2, worker-2: id=3)
  # =========================================================================
  kafka-2:
    image: confluentinc/cp-kafka:7.6.1
    container_name: nexus-kafka-2
    restart: unless-stopped
    network_mode: host
    depends_on:
      - zookeeper-2
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: ${ZK_CONNECT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${NEXUS_NODE_IP}:9092,PLAINTEXT_HOST://${NEXUS_NODE_IP}:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-3:
    image: confluentinc/cp-kafka:7.6.1
    container_name: nexus-kafka-3
    restart: unless-stopped
    network_mode: host
    depends_on:
      - zookeeper-3
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: ${ZK_CONNECT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${NEXUS_NODE_IP}:9092,PLAINTEXT_HOST://${NEXUS_NODE_IP}:29094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # =========================================================================
  # MinIO node (worker-1/2/3)
  # =========================================================================
  minio-2:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: nexus-minio-2
    restart: unless-stopped
    network_mode: host
    command: server --console-address ":9002" ${MINIO_PEERS}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ${NEXUS_RUNTIME_DIR:-/data}/minio-2:/data

  minio-3:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: nexus-minio-3
    restart: unless-stopped
    network_mode: host
    command: server --console-address ":9003" ${MINIO_PEERS}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ${NEXUS_RUNTIME_DIR:-/data}/minio-3:/data

  minio-4:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: nexus-minio-4
    restart: unless-stopped
    network_mode: host
    command: server --console-address ":9004" ${MINIO_PEERS}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ${NEXUS_RUNTIME_DIR:-/data}/minio-4:/data

  # =========================================================================
  # Spark Worker (all workers)
  # =========================================================================
  spark-worker:
    build:
      context: spark
    image: nexus-spark:3.5
    container_name: nexus-spark-worker-remote
    restart: unless-stopped
    network_mode: host
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:?Set SPARK_MASTER_URL to spark://<master-ip>:7077}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2G}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-2}
      SPARK_WORKER_WEBUI_PORT: ${SPARK_WORKER_WEBUI_PORT:-8081}
      SPARK_LOCAL_DIRS: ${SPARK_LOCAL_DIRS:-/data/spark}
      HOME: /tmp/nexus-spark-home
      HADOOP_USER_NAME: spark
      USER: spark
      LOGNAME: spark
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3.12
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3.12
    volumes:
      - ../../:/opt/nexus
      - ${NEXUS_RUNTIME_DIR:-/data}:/data

  # =========================================================================
  # Trino Worker (all workers)
  # =========================================================================
  trino-worker:
    image: trinodb/trino:451
    container_name: nexus-trino-worker-remote
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ID: trino-worker-remote
      TRINO_DISCOVERY_URI: http://${NEXUS_MASTER_PRIVATE_IP}:8085
    volumes:
      - ../../serving/query/trino/worker/config.properties:/etc/trino/config.properties
      - ../../serving/query/trino/worker/node.properties:/etc/trino/node.properties
      - ../../serving/query/trino/catalog:/etc/trino/catalog

  # =========================================================================
  # Airflow Celery Worker (all workers)
  # =========================================================================
  airflow-worker:
    image: nexus-airflow:2.9.1-python3.11
    container_name: nexus-airflow-worker-remote
    restart: unless-stopped
    network_mode: host
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_URL}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW_CELERY_BROKER_URL}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@${NEXUS_MASTER_PRIVATE_IP}:5433/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: nexus-local-secret
      NEXUS_GOVERNANCE_STORAGE: ${NEXUS_GOVERNANCE_STORAGE:-local}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      NEXUS_BUCKET: ${NEXUS_BUCKET:-nexus-lakehouse}
      NEXUS_GX_ENABLED: ${NEXUS_GX_ENABLED:-true}
      NEXUS_RUNTIME_MODE: ${NEXUS_RUNTIME_MODE:-vm}
      NEXUS_RUNTIME_DIR: ${NEXUS_RUNTIME_DIR:-/data}
      OPENLINEAGE_URL: ${OPENLINEAGE_URL:-}
      OPENLINEAGE_NAMESPACE: ${OPENLINEAGE_NAMESPACE:-nexus}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      NEXUS_AGENT_MODEL: ${NEXUS_AGENT_MODEL:-gpt-4o-mini}
      HOSTNAME: worker-remote
    command: celery worker
    volumes:
      - ../../common:/opt/airflow/common
      - ../../config:/opt/airflow/config
      - ../../domains:/opt/airflow/domains
      - ../../ingestion:/opt/airflow/ingestion
      - ../../processing:/opt/airflow/processing
      - ../../infra:/opt/airflow/infra
      - ../../transform:/opt/airflow/transform
      - ../../governance:/opt/airflow/governance
      - ../../cli:/opt/airflow/cli
      - ../../assets:/opt/airflow/assets
      - ${NEXUS_RUNTIME_DIR:-/data}:/opt/airflow/runtime

  # =========================================================================
  # Nexus API (worker-1: api-2, worker-2: api-3)
  # =========================================================================
  api-2:
    build:
      context: ../..
      dockerfile: serving/api/Dockerfile
    container_name: nexus-api-2
    restart: unless-stopped
    network_mode: host
    environment:
      TRINO_HOST: ${NEXUS_MASTER_PRIVATE_IP}
      TRINO_PORT: 8085
      TRINO_USER: ${TRINO_USER:-nexus}
      NEXUS_GOVERNANCE_STORAGE: ${NEXUS_GOVERNANCE_STORAGE:-local}
    volumes:
      - ../../common:/app/common
      - ../../config:/app/config
      - ../../domains:/app/domains
      - ${NEXUS_RUNTIME_DIR:-/data}:/app/runtime
      - ../../governance:/app/governance

  api-3:
    build:
      context: ../..
      dockerfile: serving/api/Dockerfile
    container_name: nexus-api-3
    restart: unless-stopped
    network_mode: host
    environment:
      TRINO_HOST: ${NEXUS_MASTER_PRIVATE_IP}
      TRINO_PORT: 8085
      TRINO_USER: ${TRINO_USER:-nexus}
      NEXUS_GOVERNANCE_STORAGE: ${NEXUS_GOVERNANCE_STORAGE:-local}
    volumes:
      - ../../common:/app/common
      - ../../config:/app/config
      - ../../domains:/app/domains
      - ${NEXUS_RUNTIME_DIR:-/data}:/app/runtime
      - ../../governance:/app/governance
