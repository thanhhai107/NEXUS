# Data Caterer service for NEXUS TPC-DI SF=1 benchmark data generation.
# Run with: docker compose -f data-caterer-compose.yml up
# PLAN_NAME defaults to tpcdi_tasks, SCALE_FACTOR defaults to 1.

version: "3.8"

services:
  datacaterer:
    image: pflooky/data-caterer:0.5.0
    container_name: nexus-datacaterer
    environment:
      - PLAN_NAME=${DC_PLAN_NAME:-tpcdi_tasks}
      - SCALE_FACTOR=${DC_SCALE_FACTOR:-1}
      - ERROR_PROFILE=${DC_ERROR_PROFILE:-moderate}
      - OUTPUT_FORMATS=${DC_OUTPUT_FORMATS:-csv,parquet}
      - OUTPUT_DIR=/opt/app/data/datasets
      - RUN_ID=${DC_RUN_ID:-local}
      - SPARK_MASTER=${DC_SPARK_MASTER:-local[*]}
      - SPARK_LOCAL_DIR=/opt/app/spark-temp
      - JAVA_OPTS=-Xmx8g
    volumes:
      - ../../ingestion/data_caterer/plans:/opt/app/plans:ro
      - ../../runtime:/opt/app/data
    networks:
      - nexus-network
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  datacaterer-postgres:
    image: postgres:16-alpine
    container_name: nexus-datacaterer-postgres
    environment:
      POSTGRES_DB: nexus_tpc
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${DC_POSTGRES_PASSWORD:-nexus123}
    ports:
      - "5433:5432"
    volumes:
      - datacaterer_pgdata:/var/lib/postgresql/data
    networks:
      - nexus-network
    profiles:
      - db-target

networks:
  nexus-network:
    external: true
    name: nexus_default

volumes:
  datacaterer_pgdata:
