        description: Cleaned Silver air quality measurements from OpenAQ.
        meta:
          glossary_term: Air Quality Measurement
          source_time_role: event_time
          storage_timezone: UTC
          source_crs: EPSG:4326
          storage_crs: EPSG:4326
