id: l4a_production_full
level: 4
seed: 70
source_count: 12
description: "Production-like: all 12 TPC-DS tables, each with 5 unique errors — 60 total"
source_configs:
  - format: csv
    tables: [tpcds_customer, tpcds_customer_address, tpcds_customer_demographics]
  - format: parquet
    tables: [tpcds_item, tpcds_store, tpcds_warehouse]
  - format: jsonl
    tables: [tpcds_date_dim, tpcds_time_dim]
  - format: csv
    tables: [tpcds_store_sales, tpcds_web_sales]
  - format: csv
    tables: [tpcds_catalog_sales, tpcds_inventory]
errors:
  # --- Schema errors (5) ---
  - category: schema_issues
    type: missing_field
    table: tpcds_customer
    params: { field: "c_email_address", probability: 1.0 }
  - category: schema_issues
    type: new_field
    table: tpcds_item
    params: { field: "data_source_id", generator_type: "random_string" }
  - category: schema_issues
    type: field_rename
    table: tpcds_store_sales
    params: { old_name: "ss_net_profit", new_name: "net_margin" }
  - category: schema_issues
    type: data_type_change
    table: tpcds_web_sales
    params: { field: "ws_quantity", new_type: "string" }
  - category: schema_issues
    type: used_field_removed
    table: tpcds_date_dim
    params: { field: "d_day_name", probability: 1.0 }
  # --- Semantic errors (5) ---
  - category: semantic_issues
    type: different_name_same_meaning
    table: tpcds_catalog_sales
    params: { old_name: "cs_sales_price", new_name: "revenue" }
  - category: semantic_issues
    type: different_units
    table: tpcds_store_sales
    params: { field: "ss_sales_price", multiplier: 0.85 }
  - category: semantic_issues
    type: entity_resolution_problems
    table: tpcds_customer
    params: { field: "c_customer_sk", key_offset: 1000000, probability: 1.0 }
  - category: semantic_issues
    type: different_business_definition
    table: tpcds_web_sales
    params: { field: "ws_net_profit", transform: "double" }
  - category: semantic_issues
    type: different_aggregation_level
    table: tpcds_inventory
    params: { field: "inv_quantity_on_hand", aggregation: "sum", group_by: "inv_warehouse_sk" }
  # --- Quality errors (5) ---
  - category: data_quality
    type: invalid_data
    table: tpcds_store_sales
    params: { field: "ss_quantity", min_val: 1, max_val: 100, ratio: 0.05 }
  - category: data_quality
    type: missing_data_mcar
    table: tpcds_item
    params: { field: "i_color", ratio: 0.10 }
  - category: data_quality
    type: duplicate_data
    table: tpcds_catalog_sales
    params: { ratio: 0.03 }
  - category: data_quality
    type: outliers
    table: tpcds_inventory
    params: { field: "inv_quantity_on_hand", multiplier: 3.0, ratio: 0.03 }
  - category: data_quality
    type: cross_source_inconsistency
    table: tpcds_customer
    params: { field: "c_preferred_cust_flag", ratio: 0.05 }
  # --- Reliability errors (5) ---
  - category: reliability
    type: api_failures
    table: tpcds_store_sales
    params: { p_failure: 0.20 }
  - category: reliability
    type: retry_duplicates
    table: tpcds_web_sales
    params: { p_duplicate: 0.05 }
  - category: reliability
    type: non_idempotent_writes
    table: tpcds_catalog_sales
    params: { replay_count: 2 }
  - category: reliability
    type: out_of_order_data
    table: tpcds_inventory
    params: { p_shuffle: 0.15 }
  - category: reliability
    type: poison_records
    table: tpcds_item
    params: { ratio: 0.005 }
