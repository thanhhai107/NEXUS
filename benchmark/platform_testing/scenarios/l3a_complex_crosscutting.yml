id: l3a_complex_crosscutting
level: 3
seed: 60
source_count: 5
description: "5 sources with 25 errors across schema, semantic, quality — cross-cutting interactions"
source_configs:
  - format: csv
    tables: [tpcds_customer, tpcds_store_sales]
  - format: parquet
    tables: [tpcds_customer, tpcds_catalog_sales]
  - format: jsonl
    tables: [tpcds_item, tpcds_web_sales]
  - format: csv
    tables: [tpcds_date_dim, tpcds_time_dim]
  - format: csv
    tables: [tpcds_inventory, tpcds_warehouse]
errors:
  # --- Schema errors ---
  - category: schema_issues
    type: missing_field
    source_index: 0
    table: tpcds_customer
    params: { field: "c_email_address", probability: 1.0 }
  - category: schema_issues
    type: new_field
    source_index: 1
    table: tpcds_customer
    params: { field: "risk_score", generator_type: "random_integer", min_val: 1, max_val: 100 }
  - category: schema_issues
    type: field_rename
    source_index: 2
    table: tpcds_item
    params: { old_name: "i_item_desc", new_name: "item_description" }
  - category: schema_issues
    type: data_type_change
    source_index: 0
    table: tpcds_store_sales
    params: { field: "ss_quantity", new_type: "string" }
  - category: schema_issues
    type: used_field_removed
    source_index: 3
    table: tpcds_date_dim
    params: { field: "d_day_name", probability: 1.0 }
  # --- Semantic errors ---
  - category: semantic_issues
    type: different_name_same_meaning
    source_index: 1
    table: tpcds_catalog_sales
    params: { old_name: "cs_sales_price", new_name: "price_paid" }
  - category: semantic_issues
    type: different_units
    source_index: 2
    table: tpcds_web_sales
    params: { field: "ws_sales_price", multiplier: 0.85 }
  - category: semantic_issues
    type: different_business_definition
    source_index: 1
    table: tpcds_catalog_sales
    params: { field: "cs_net_profit", transform: "negate" }
  - category: semantic_issues
    type: entity_resolution_problems
    source_index: 1
    table: tpcds_customer
    params: { field: "c_customer_sk", key_offset: 500000, probability: 1.0 }
  - category: semantic_issues
    type: different_aggregation_level
    source_index: 4
    table: tpcds_inventory
    params: { field: "inv_quantity_on_hand", aggregation: "sum", group_by: "inv_warehouse_sk" }
  # --- Quality errors ---
  - category: data_quality
    type: invalid_data
    source_index: 0
    table: tpcds_store_sales
    params: { field: "ss_quantity", min_val: 1, max_val: 100, ratio: 0.05 }
  - category: data_quality
    type: missing_data_mcar
    source_index: 2
    table: tpcds_item
    params: { field: "i_color", ratio: 0.10 }
  - category: data_quality
    type: missing_data_mar
    source_index: 0
    table: tpcds_store_sales
    params: { field: "ss_coupon_amt", condition_field: "ss_list_price", ratio: 0.08 }
  - category: data_quality
    type: duplicate_data
    source_index: 2
    table: tpcds_web_sales
    params: { ratio: 0.03 }
  - category: data_quality
    type: outliers
    source_index: 4
    table: tpcds_inventory
    params: { field: "inv_quantity_on_hand", multiplier: 3.0, ratio: 0.03 }
  # --- Reliability ---
  - category: reliability
    type: api_failures
    source_index: 0
    table: tpcds_store_sales
    params: { p_failure: 0.15 }
  - category: reliability
    type: out_of_order_data
    source_index: 2
    table: tpcds_web_sales
    params: { p_shuffle: 0.10 }
