id: l4b_adversarial
level: 4
seed: 71
source_count: 12
description: "Adversarial: errors designed to evade detection (epsilon boundaries)"
source_configs:
  - format: csv
    tables: [tpcds_customer, tpcds_item, tpcds_store_sales]
  - format: parquet
    tables: [tpcds_web_sales, tpcds_catalog_sales, tpcds_inventory]
errors:
  - category: schema_issues
    type: field_rename
    table: tpcds_customer
    params: { old_name: "c_first_name", new_name: "first_name" }
  - category: schema_issues
    type: data_type_change
    table: tpcds_store_sales
    params: { field: "ss_quantity", new_type: "float" }
  - category: data_quality
    type: invalid_data
    table: tpcds_store_sales
    params: { field: "ss_quantity", ratio: 0.01 }
  - category: data_quality
    type: missing_data_mcar
    table: tpcds_item
    params: { field: "i_color", ratio: 0.02 }
  - category: reliability
    type: late_arriving_data
    table: tpcds_inventory
    params: { delay_days: 3, date_fields: ["inv_date_sk"] }
  - category: reliability
    type: poison_records
    table: tpcds_item
    params: { ratio: 0.001 }
