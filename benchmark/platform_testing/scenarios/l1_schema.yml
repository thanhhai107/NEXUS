# Level 1: Simple — Schema Issues (S1-S5 on 3 tables)
id: l1_schema
level: 1
seed: 42
source_count: 1
description: "Single source with 5 schema-level errors on customer, item, store_sales"
source_configs:
  - format: csv
    tables: [tpcds_customer, tpcds_item, tpcds_store_sales]
errors:
  - category: schema_issues
    type: missing_field
    table: tpcds_customer
    params: { field: "c_email_address", probability: 1.0 }
    expected_detection: "dropped_downstream_field"

  - category: schema_issues
    type: new_field
    table: tpcds_item
    params: { field: "loyalty_tier", generator_type: "categorical", values: ["bronze", "silver", "gold"] }
    expected_detection: "new_unknown_field"

  - category: schema_issues
    type: field_rename
    table: tpcds_customer
    params: { old_name: "c_first_name", new_name: "cust_first_name" }
    expected_detection: "field_rename_candidate"

  - category: schema_issues
    type: data_type_change
    table: tpcds_store_sales
    params: { field: "ss_quantity", new_type: "string" }
    expected_detection: "field_type_change"

  - category: schema_issues
    type: missing_field
    table: tpcds_store_sales
    params: { field: "ss_wholesale_cost", probability: 1.0 }
    expected_detection: "missing_required_field"
