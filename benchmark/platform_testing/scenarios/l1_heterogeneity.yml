# Level 1: Simple — Heterogeneity (H1-H2, 2 sources)
id: l1_heterogeneity
level: 1
seed: 45
source_count: 2
description: "Two sources: source0=CSV, source1=Parquet with document nesting"
source_configs:
  - format: csv
    tables: [tpcds_customer, tpcds_store_sales, tpcds_item]
  - format: parquet
    tables: [tpcds_customer, tpcds_store_sales]
errors:
  - category: heterogeneity
    type: different_formats
    source_index: 1
    params: { format: "parquet" }
    expected_detection: "multi_format_handling"

  - category: heterogeneity
    type: different_data_models
    source_index: 1
    table: tpcds_customer
    params: { model: "document", nesting_keys: ["c_first_name", "c_last_name", "c_email_address"] }
    expected_detection: "document_model_detected"
