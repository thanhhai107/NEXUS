id: l2b_semantic_entity_lineage
level: 2
seed: 51
source_count: 3
description: "3 sources with semantic, entity resolution, and lineage errors"
source_configs:
  - format: csv
    tables: [tpcds_customer, tpcds_store_sales]
  - format: csv
    tables: [tpcds_customer, tpcds_store_sales]
  - format: csv
    tables: [tpcds_customer]
errors:
  - category: semantic_issues
    type: different_name_same_meaning
    source_index: 1
    table: tpcds_store_sales
    params: { old_name: "ss_sales_price", new_name: "revenue" }
    expected_detection: "synonym_detected"
  - category: semantic_issues
    type: different_units
    source_index: 1
    table: tpcds_store_sales
    params: { field: "ss_sales_price", multiplier: 0.85 }
    expected_detection: "unit_mismatch"
  - category: semantic_issues
    type: entity_resolution_problems
    source_index: 2
    table: tpcds_customer
    params: { field: "c_customer_sk", key_offset: 1000000, probability: 1.0 }
    expected_detection: "entity_mismatch"
  - category: semantic_issues
    type: different_business_definition
    source_index: 1
    table: tpcds_store_sales
    params: { field: "ss_net_profit", transform: "double" }
    expected_detection: "business_definition_mismatch"
  - category: data_quality
    type: cross_source_inconsistency
    source_index: 1
    table: tpcds_customer
    params: { field: "c_preferred_cust_flag", ratio: 0.05 }
    expected_detection: "cross_source_inconsistency"
