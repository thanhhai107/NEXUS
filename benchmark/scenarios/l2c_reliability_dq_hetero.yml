id: l2c_reliability_dq_hetero
level: 2
seed: 52
source_count: 3
description: "3 sources with reliability, quality, and heterogeneity errors"
source_configs:
  - format: csv
    tables: [tpcds_store_sales]
  - format: csv
    tables: [tpcds_inventory]
  - format: csv
    tables: [tpcds_item]
errors:
  - category: reliability
    type: api_failures
    source_index: 0
    table: tpcds_store_sales
    params: { p_failure: 0.30 }
    expected_detection: "dlq_entry"
  - category: reliability
    type: retry_duplicates
    source_index: 0
    table: tpcds_store_sales
    params: { p_duplicate: 0.05 }
    expected_detection: "retry_duplicate_detected"
  - category: reliability
    type: out_of_order_data
    source_index: 1
    table: tpcds_inventory
    params: { p_shuffle: 0.20 }
    expected_detection: "out_of_order_detected"
  - category: data_quality
    type: outliers
    source_index: 1
    table: tpcds_inventory
    params: { field: "inv_quantity_on_hand", multiplier: 3.0, ratio: 0.02 }
    expected_detection: "outlier_detected"
  - category: data_quality
    type: invalid_data
    source_index: 2
    table: tpcds_item
    params: { field: "i_current_price", ratio: 0.05 }
    expected_detection: "invalid_data"
