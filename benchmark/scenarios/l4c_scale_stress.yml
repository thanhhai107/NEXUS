id: l4c_scale_stress
level: 4
seed: 72
source_count: 12
description: "Scale stress: all tables at SF=10 volume with reliability failures"
source_configs:
  - format: csv
    tables: [tpcds_store_sales, tpcds_web_sales, tpcds_catalog_sales, tpcds_inventory]
  - format: parquet
    tables: [tpcds_customer, tpcds_item, tpcds_customer_address, tpcds_customer_demographics]
  - format: jsonl
    tables: [tpcds_date_dim, tpcds_time_dim, tpcds_store, tpcds_warehouse]
errors:
  - category: reliability
    type: api_failures
    table: tpcds_store_sales
    params: { p_failure: 0.25 }
  - category: reliability
    type: non_idempotent_writes
    table: tpcds_inventory
    params: { replay_count: 3 }
  - category: reliability
    type: out_of_order_data
    table: tpcds_web_sales
    params: { p_shuffle: 0.10 }
  - category: data_quality
    type: missing_data_mcar
    table: tpcds_customer
    params: { field: "c_email_address", ratio: 0.05 }
  - category: data_quality
    type: duplicate_data
    table: tpcds_catalog_sales
    params: { ratio: 0.02 }
