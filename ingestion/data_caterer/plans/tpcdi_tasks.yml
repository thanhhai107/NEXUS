plan:
  name: "tpcdi_tasks"
  description: "TPC-DI Data Integration benchmark tables — SF=1"
  options:
    format: "csv"
    delimiter: "|"
    header: true
    saveMode: "overwrite"

tasks:

  # ══════════════════════════════════════════════════════════════════════════════
  # 1. tpcdi_dim_date — 2,557 rows
  # ══════════════════════════════════════════════════════════════════════════════
  - name: "tpcdi_dim_date"
    steps:
      - name: "dim_date"
        type: "batch"
        count:
          total: 2557
        error:
          nullProbability: 0.005
          missingForeignKeyProbability: 0.01
        fields:
          - name: "sk_date"
            type: "integer"
            generator: "increment"
            options:
              start: 1
              step: 1
            edgeCases:
              - type: "null"
                probability: 0.005
          - name: "date"
            type: "date"
            generator: "sequence"
            options:
              start: "2015-01-01"
              end: "2021-12-31"
              format: "yyyy-MM-dd"
            edgeCases:
              - type: "dateFormatError"
                probability: 0.002
          - name: "day_name"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Monday"
                - "Tuesday"
                - "Wednesday"
                - "Thursday"
                - "Friday"
                - "Saturday"
                - "Sunday"
            edgeCases:
              - type: "null"
