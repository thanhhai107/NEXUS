            generator: "random"
            options:
              min: 1
              max: 366
            edgeCases:
              - type: "null"
                probability: 0.005
              - type: "maxInt"
                probability: 0.001
          - name: "week_of_year"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 53
            edgeCases:
              - type: "null"
                probability: 0.005
              - type: "maxInt"
                probability: 0.001
          - name: "month_name"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "January"
                - "February"
                - "March"
                - "April"
                - "May"
                - "June"
                - "July"
                - "August"
                - "September"
