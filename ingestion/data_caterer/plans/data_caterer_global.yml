# ──────────────────────────────────────────────────────────────────────────────
# NEXUS Data Caterer — Global Configuration
# ──────────────────────────────────────────────────────────────────────────────

global:
  name: "nexus_tpc_data_caterer"
  version: "1.0"
  description: "NEXUS TPC benchmark data generation using Data Caterer"

  docker:
    image: "pflooky/data-caterer:0.5.0"
    pullPolicy: "IfNotPresent"
    volumes:
      - hostPath: "/opt/nexus/NEXUS/runtime/datasets"
        containerPath: "/opt/app/data"
      - hostPath: "/opt/nexus/NEXUS/ingestion/data_caterer/plans"
        containerPath: "/opt/app/plans"
      - hostPath: "/opt/nexus/NEXUS/runtime/reports"
        containerPath: "/opt/app/reports"

  spark:
    mode: "local"
    local:
      master: "local[*]"
      driverMemory: "4g"
      executorMemory: "2g"
      sqlShufflePartitions: 200
    cluster:
      enabled: false
      master: "spark://spark-master:7077"
      deployMode: "client"
      driverMemory: "8g"
      executorMemory: "4g"
      executorCores: 2
      numExecutors: 4
      sqlShufflePartitions: 400

  output:
    formats:
      bronze:
        format: "csv"
        options:
          header: true
          delimiter: "|"
          compression: "none"
      silver:
        format: "parquet"
        options:
          compression: "snappy"
          mode: "overwrite"
    basePath: "/opt/nexus/NEXUS/runtime/datasets"

  plans:
    directory: "/opt/nexus/NEXUS/ingestion/data_caterer/plans"
    files:
      - tpcdi_tasks.yml

  runMode:
    default: "batch"
    available:
      - batch

  recordCount:
    tracking:
      enabled: true
      statsTable: "nexus_data_caterer_record_counts"
      statsSink:
        format: "parquet"
        options:
          path: "/opt/nexus/NEXUS/runtime/reports/record_counts"

  report:
    generation:
      enabled: true
      format: "html"
      outputPath: "/opt/nexus/NEXUS/runtime/reports"
      options:
        includeDataProfile: true
        includeSchema: true
        includeRecordCounts: true
        includeErrorSummary: true
        includeValidationResults: true

  validation:
    rowCountCheck: true
    schemaCheck: true
    foreignKeyCheck: true
    uniqueCheck: true
    nullThreshold: 0.05
    onFailure: "warn"

  cleanup:
    policy: "keep"
    keepGeneratedData: true
    deleteTempFiles: true

  notifications:
    enabled: false
    onSuccess: []
    onFailure: []
    onCompletion: []

  logging:
    level: "INFO"
    format: "json"
    output: "file"
    filePath: "/opt/nexus/NEXUS/runtime/logs/data_caterer.log"
