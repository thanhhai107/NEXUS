plan:
  name: "tpcds_tasks"
  description: "TPC-DS per-table task definitions — SF=1 with key dimension and fact tables"

tasks:
  # ── date_dim (73,049 rows ~ 200 years of dates) ─────────────────────────────
  - name: "tpcds_date_dim"
    steps:
      - name: "date_dim"
        type: "batch"
        count:
          total: 73049
        fields:
          - name: "d_date_sk"
            type: "integer"
            generator: "increment"
            options:
              start: 2415022
              step: 1
          - name: "d_date_id"
            type: "string"
            generator: "expression"
            options:
              expression: "'AAAAAAAABAAAAAAA'"
          - name: "d_date"
            type: "date"
            generator: "sequence"
            options:
              start: "1900-01-01"
              step: 1
              unit: "day"
              format: "yyyy-MM-dd"
            edgeCases:
              - type: "dateFormatError"
                probability: 0.001
          - name: "d_month_seq"
            type: "integer"
            generator: "random"
            options:
              min: 0
              max: 2400
          - name: "d_week_seq"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 10400
          - name: "d_quarter_seq"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 800
          - name: "d_year"
            type: "integer"
            generator: "random"
            options:
              min: 1900
              max: 2100
            edgeCases:
              - type: "maxInt"
                probability: 0.001
          - name: "d_dow"
            type: "integer"
            generator: "random"
            options:
              min: 0
              max: 6
          - name: "d_moy"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 12
          - name: "d_dom"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 31
          - name: "d_qoy"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 4
          - name: "d_fy_year"
            type: "integer"
            generator: "random"
            options:
              min: 1900
              max: 2100
          - name: "d_fy_quarter_seq"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 800
          - name: "d_fy_week_seq"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 10400
          - name: "d_day_name"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Sunday"
                - "Monday"
                - "Tuesday"
                - "Wednesday"
                - "Thursday"
                - "Friday"
                - "Saturday"
          - name: "d_quarter_name"
            type: "string"
            generator: "regex"
            options:
              expression: "(190[0-9]|19[0-9]{2}|20[0-9]{2}|2100) Q[1-4]"
          - name: "d_holiday"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Y"
                - "N"
          - name: "d_weekend"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Y"
                - "N"
          - name: "d_following_holiday"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Y"
                - "N"
          - name: "d_first_dom"
            type: "integer"
            generator: "random"
            options:
              min: 2415022
              max: 2488070
          - name: "d_last_dom"
            type: "integer"
            generator: "random"
            options:
              min: 2415022
              max: 2488070
          - name: "d_same_day_ly"
            type: "integer"
            generator: "random"
            options:
              min: 2415022
              max: 2488070
          - name: "d_same_day_lq"
            type: "integer"
            generator: "random"
            options:
              min: 2415022
              max: 2488070
          - name: "d_current_day"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Y"
                - "N"
          - name: "d_current_week"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Y"
                - "N"
          - name: "d_current_month"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Y"
                - "N"
          - name: "d_current_quarter"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Y"
                - "N"
          - name: "d_current_year"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Y"
                - "N"

  # ── time_dim (86,400 rows — one per second of the day) ───────────────────────
  - name: "tpcds_time_dim"
    steps:
      - name: "time_dim"
        type: "batch"
        count:
          total: 86400
        fields:
          - name: "t_time_sk"
            type: "integer"
            generator: "increment"
            options:
              start: 0
              step: 1
          - name: "t_time_id"
            type: "string"
            generator: "expression"
            options:
              expression: "'AAAAAAAABAAAAAAA'"
          - name: "t_time"
            type: "integer"
            generator: "random"
            options:
              min: 0
              max: 86399
            edgeCases:
              - type: "maxInt"
                probability: 0.001
          - name: "t_hour"
            type: "integer"
            generator: "random"
            options:
              min: 0
              max: 23
          - name: "t_minute"
            type: "integer"
            generator: "random"
            options:
              min: 0
              max: 59
          - name: "t_second"
            type: "integer"
            generator: "random"
            options:
              min: 0
              max: 59
          - name: "t_am_pm"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "AM"
                - "PM"
          - name: "t_shift"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "first"
                - "second"
                - "third"
          - name: "t_sub_shift"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "morning"
                - "afternoon"
                - "night"
          - name: "t_meal_time"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "breakfast"
                - "lunch"
                - "dinner"
                - ""

  # ── item (18,000 rows, can scale to 300k) ────────────────────────────────────
  - name: "tpcds_item"
    steps:
      - name: "item"
        type: "batch"
        count:
          total: 18000
        fields:
          - name: "i_item_sk"
            type: "integer"
            generator: "increment"
            options:
              start: 1
              step: 1
          - name: "i_item_id"
            type: "string"
            generator: "regex"
            options:
              expression: "AAAAAAA[A-Z]{8}"
          - name: "i_rec_start_date"
            type: "date"
            generator: "random"
            options:
              min: "1997-01-01"
              max: "2001-12-31"
              format: "yyyy-MM-dd"
          - name: "i_rec_end_date"
            type: "date"
            generator: "random"
            options:
              min: "2001-01-01"
              max: "2006-12-31"
              format: "yyyy-MM-dd"
          - name: "i_item_desc"
            type: "string"
            generator: "regex"
            options:
              expression: "[a-zA-Z0-9, ]{50,200}"
          - name: "i_current_price"
            type: "decimal"
            generator: "random"
            options:
              min: 0.99
              max: 999.99
              decimals: 2
            edgeCases:
              - type: "negativeAmount"
                probability: 0.01
              - type: "nan"
                probability: 0.001
          - name: "i_wholesale_cost"
            type: "decimal"
            generator: "random"
            options:
              min: 0.50
              max: 500.00
              decimals: 2
            edgeCases:
              - type: "negativeAmount"
                probability: 0.01
          - name: "i_brand_id"
            type: "integer"
            generator: "random"
            options:
              min: 1001001
              max: 7017010
            edgeCases:
              - type: "maxInt"
                probability: 0.001
          - name: "i_brand"
            type: "string"
            generator: "regex"
            options:
              expression: "(amalg|amalgamalg|exporti|exportiexporti|edu packedu pack|brand|corp|maxi|nameless|univamalg|scholar|scholaramalg|corpbrand|amalgedu|exportischolar|edu|importo|amalguniv|brandmaxi|brandcorp|univuniv|amalgexporti|amalgscholar|amalgbrand|amalgcorp|amalgnameless|amalgmaxi|scholaruniv|namelessnameless|importoimporto|brandbrand|corpcorp|maximaxi|amalgamalgamalg|importoamalg|brandscholar|univbrand|brandedu|corpamalg|scholarmaxi|branduniv|scholarnameless)_(brand|corp|maxi|amalg|edu|exporti|importo|nameless|scholar|univ)"
          - name: "i_class_id"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 15
          - name: "i_class"
            type: "string"
            generator: "regex"
            options:
              expression: "(baby|decor|garden|glass|hardware|health|home|jewelry|lacrosse|music|optics|paint|pop|sports|swim|tennis|womens)"
          - name: "i_category_id"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 10
          - name: "i_category"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Books"
                - "Children"
                - "Electronics"
                - "Home"
                - "Jewelry"
                - "Men"
                - "Music"
                - "Shoes"
                - "Sports"
                - "Women"
          - name: "i_manufact_id"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 1000
          - name: "i_manufact"
            type: "string"
            generator: "regex"
            options:
              expression: "(able|ation|bar|ought|ese|pri) (able|anti|ation|bar|cally|ese|ese|n st|ought|pri)"
          - name: "i_size"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "small"
                - "medium"
                - "large"
                - "economy"
                - "extra large"
                - "petite"
                - "N/A"
          - name: "i_formulation"
            type: "string"
            generator: "regex"
            options:
              expression: "[0-9]{6}[a-z]{2}"
          - name: "i_color"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "almond"
                - "antique"
                - "aquamarine"
                - "azure"
                - "bisque"
                - "black"
                - "blush"
                - "brown"
                - "chartreuse"
                - "chocolate"
                - "coral"
                - "cornflower"
                - "cream"
                - "cyan"
                - "dark"
                - "deep"
                - "dim"
                - "dodger"
                - "firebrick"
                - "floral"
                - "forest"
                - "gainsboro"
                - "ghost"
                - "golden"
                - "green"
                - "grey"
                - "honeydew"
                - "ivory"
                - "khaki"
                - "lace"
                - "lavender"
                - "lawn"
                - "lemon"
                - "light"
                - "linen"
                - "magenta"
                - "maroon"
                - "moccasin"
                - "navajo"
                - "navy"
                - "olive"
                - "orange"
                - "orchid"
                - "pale"
                - "papaya"
                - "peach"
                - "peru"
                - "pink"
                - "plum"
                - "powder"
                - "purple"
                - "red"
                - "rose"
                - "rosy"
                - "royal"
                - "saddle"
                - "salmon"
                - "sandy"
                - "seashell"
                - "sienna"
                - "sky"
                - "slate"
                - "smoke"
                - "snow"
                - "steel"
                - "tan"
                - "thistle"
                - "tomato"
                - "turquoise"
                - "violet"
                - "wheat"
                - "white"
                - "yellow"
          - name: "i_units"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Bundle"
                - "Carton"
                - "Case"
                - "Dozen"
                - "Each"
                - "Gram"
                - "Gross"
                - "Kg"
                - "Lb"
                - "Oz"
                - "Pallet"
                - "Pk"
                - "Tbl"
                - "Ton"
                - "Unknown"
          - name: "i_container"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "SM CASE"
                - "SM BOX"
                - "SM BAG"
                - "SM JAR"
                - "SM PACK"
                - "SM PKG"
                - "SM CAN"
                - "LG CASE"
                - "LG BOX"
                - "LG BAG"
                - "LG JAR"
                - "LG PACK"
                - "LG PKG"
                - "LG CAN"
                - "MED CASE"
                - "MED BOX"
                - "MED BAG"
                - "MED JAR"
                - "MED PACK"
                - "MED PKG"
                - "MED CAN"
                - "JUMBO CASE"
                - "JUMBO BOX"
                - "JUMBO BAG"
                - "JUMBO JAR"
                - "JUMBO PACK"
                - "JUMBO PKG"
          - name: "i_manager_id"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 100
          - name: "i_product_name"
            type: "string"
            generator: "regex"
            options:
              expression: "(able|ation|bar|ought|ese|pri) (able|anti|ation|bar|cally|ese|n st|ought|pri)"
        error:
          missingForeignKeyProbability: 0.02
          negativeAmountProbability: 0.01
          wrongTypeProbability: 0.005

  # ── customer (100,000 rows, can scale to 2M) ─────────────────────────────────
  - name: "tpcds_customer"
    steps:
      - name: "customer"
        type: "batch"
        count:
          total: 100000
        fields:
          - name: "c_customer_sk"
            type: "integer"
            generator: "increment"
            options:
              start: 1
              step: 1
          - name: "c_customer_id"
            type: "string"
            generator: "regex"
            options:
              expression: "AAAAAAA[A-Z]{8}"
          - name: "c_current_cdemo_sk"
            type: "integer"
            generator: "foreignKey"
            options:
              referenceTable: "customer_demographics"
              referenceField: "cd_demo_sk"
              min: 1
              max: 1920800
            foreignKey:
              parentTask: "tpcds_customer_demographics"
              parentStep: "customer_demographics"
              parentField: "cd_demo_sk"
          - name: "c_current_hdemo_sk"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 7200
          - name: "c_current_addr_sk"
            type: "integer"
            generator: "foreignKey"
            options:
              referenceTable: "customer_address"
              referenceField: "ca_address_sk"
              min: 1
              max: 50000
            foreignKey:
              parentTask: "tpcds_customer_address"
              parentStep: "customer_address"
              parentField: "ca_address_sk"
          - name: "c_first_shipto_date_sk"
            type: "integer"
            generator: "random"
            options:
              min: 2415022
              max: 2488070
          - name: "c_first_sales_date_sk"
            type: "integer"
            generator: "random"
            options:
              min: 2415022
              max: 2488070
          - name: "c_salutation"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Mr."
                - "Mrs."
                - "Ms."
                - "Dr."
                - "Miss"
                - "Sir"
          - name: "c_first_name"
            type: "string"
            generator: "regex"
            options:
              expression: "[A-Z][a-z]{3,10}"
          - name: "c_last_name"
            type: "string"
            generator: "regex"
            options:
              expression: "[A-Z][a-z]{3,12}"
          - name: "c_preferred_cust_flag"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Y"
                - "N"
          - name: "c_birth_day"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 31
          - name: "c_birth_month"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 12
          - name: "c_birth_year"
            type: "integer"
            generator: "random"
            options:
              min: 1920
              max: 2010
          - name: "c_birth_country"
            type: "string"
            generator: "regex"
            options:
              expression: "[A-Z ]{5,20}"
          - name: "c_login"
            type: "string"
            generator: "regex"
            options:
              expression: "[a-z0-9]{8}"
          - name: "c_email_address"
            type: "string"
            generator: "regex"
            options:
              expression: "[a-z]{1,8}@[a-z]{3,8}\\.(com|net|org|edu)"
          - name: "c_last_review_date"
            type: "string"
            generator: "regex"
            options:
              expression: "(245[0-9]{4})"
        error:
          missingForeignKeyProbability: 0.02
          wrongTypeProbability: 0.005

  # ── customer_address (50,000 rows, can scale to 500k) ───────────────────────
  - name: "tpcds_customer_address"
    steps:
      - name: "customer_address"
        type: "batch"
        count:
          total: 50000
        fields:
          - name: "ca_address_sk"
            type: "integer"
            generator: "increment"
            options:
              start: 1
              step: 1
          - name: "ca_address_id"
            type: "string"
            generator: "regex"
            options:
              expression: "AAAAAAA[A-Z]{8}"
          - name: "ca_street_number"
            type: "string"
            generator: "regex"
            options:
              expression: "[0-9]{1,5}"
          - name: "ca_street_name"
            type: "string"
            generator: "regex"
            options:
              expression: "[A-Z][a-z]+ (Street|Ave|Rd|Blvd|Dr|Ln|Way|Ct|Pl|Cir|Pkwy)"
          - name: "ca_street_type"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Street"
                - "Avenue"
                - "Road"
                - "Boulevard"
                - "Drive"
                - "Lane"
                - "Way"
                - "Court"
                - "Place"
                - "Circle"
                - "Parkway"
          - name: "ca_suite_number"
            type: "string"
            generator: "regex"
            options:
              expression: "(Suite|Apt|Unit) [0-9]{1,3}[A-Z]?"
            edgeCases:
              - type: "emptyString"
                probability: 0.05
          - name: "ca_city"
            type: "string"
            generator: "regex"
            options:
              expression: "[A-Z][a-z]+( [A-Z][a-z]+)?"
          - name: "ca_county"
            type: "string"
            generator: "regex"
            options:
              expression: "[A-Z][a-z]+ County"
          - name: "ca_state"
            type: "string"
            generator: "regex"
            options:
              expression: "[A-Z]{2}"
          - name: "ca_zip"
            type: "string"
            generator: "regex"
            options:
              expression: "[0-9]{5}(-[0-9]{4})?"
          - name: "ca_country"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "United States"
                - "Canada"
                - "Mexico"
                - "United Kingdom"
          - name: "ca_gmt_offset"
            type: "decimal"
            generator: "random"
            options:
              min: -12.00
              max: 12.00
              decimals: 2
          - name: "ca_location_type"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "apartment"
                - "condo"
                - "house"
                - "single family"
                - "townhouse"

  # ── customer_demographics (1,920,800 rows) ───────────────────────────────────
  - name: "tpcds_customer_demographics"
    steps:
      - name: "customer_demographics"
        type: "batch"
        count:
          total: 1920800
          perBatch: 100000
        fields:
          - name: "cd_demo_sk"
            type: "integer"
            generator: "increment"
            options:
              start: 1
              step: 1
          - name: "cd_gender"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "M"
                - "F"
          - name: "cd_marital_status"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "M"
                - "S"
                - "W"
                - "D"
                - "U"
          - name: "cd_education_status"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Advanced Degree"
                - "Bachelors"
                - "College"
                - "High School"
                - "Primary"
                - "Secondary"
                - "Unknown"
          - name: "cd_purchase_estimate"
            type: "integer"
            generator: "random"
            options:
              min: 500
              max: 10000
          - name: "cd_credit_rating"
            type: "string"
            generator: "oneOf"
            options:
              values:
                - "Good"
                - "High Risk"
                - "Low Risk"
                - "Unknown"
          - name: "cd_dep_count"
            type: "integer"
            generator: "random"
            options:
              min: 0
              max: 6
          - name: "cd_dep_employed_count"
            type: "integer"
            generator: "random"
            options:
              min: 0
              max: 6
          - name: "cd_dep_college_count"
            type: "integer"
            generator: "random"
            options:
              min: 0
              max: 6

  # ── store (12 rows, can scale to 1k) ────────────────────────────────────────
  - name: "tpcds_store"
    steps:
      - name: "store"
        type: "batch"
        count:
          total: 12
        fields:
          - name: "s_store_sk"
            type: "integer"
            generator: "increment"
            options:
              start: 1
              step: 1
          - name: "s_store_id"
            type: "string"
            generator: "regex"
            options:
              expression: "AAAAAAA[A-Z]{8}"
          - name: "s_rec_start_date"
            type: "date"
            generator: "random"
            options:
              min: "1997-01-01"
              max: "2001-12-31"
              format: "yyyy-MM-dd"
          - name: "s_rec_end_date"
            type: "date"
            generator: "random"
            options:
              min: "2001-01-01"
              max: "2006-12-31"
              format: "yyyy-MM-dd"
          - name: "s_closed_date_sk"
            type: "integer"
            generator: "random"
            options:
              min: 2415022
              max: 2488070
          - name: "s_store_name"
            type: "string"
            generator: "regex"
            options:
              expression: "(able|ation|bar|ought|ese|pri) [A-Z][a-z]+"
          - name: "s_number_employees"
            type: "integer"
            generator: "random"
            options:
              min: 1
              max: 500
          - name: "s_floor_space"
            type: "integer"
            generator: "random"
            options:
              min: 5000
