# =============================================================================
# Data Caterer Configuration — TPC-DI SF=1 (Sole Benchmark)
# =============================================================================

data_caterer:
  enabled: true
  default_engine: docker
  default_mode: batch

  plans:
    tpcdi:
      description: TPC-DI Data Integration (17 tables, SF=1)
      plan_file: tpcdi_tasks.yml
      default_scale_factor: 1
      record_counts:
        dim_date: 2557
        dim_time: 86400
        dim_account: 50000
        dim_customer: 50000
        dim_broker: 10
        dim_security: 6850
        dim_company: 5000
        dim_trade: 865000
        fact_cash_balances: 250000
        fact_holdings: 500000
        fact_market_history: 34250
        fact_watches: 500
        industry: 100
        status_type: 10
        tax_rate: 15
        trade_type: 5
        prospect: 1000

  error_injection:
    profiles:
      none:
        null_ratio: 0.0
        duplicate_ratio: 0.0
        fk_violation_ratio: 0.0
      low:
        null_ratio: 0.01
        duplicate_ratio: 0.005
      moderate:
        null_ratio: 0.05
        duplicate_ratio: 0.02
      high:
        null_ratio: 0.15
        duplicate_ratio: 0.05
      extreme:
        null_ratio: 0.30
        duplicate_ratio: 0.10
