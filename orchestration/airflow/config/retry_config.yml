# Retry Configuration
# Global defaults and per-source overrides

default:
  max_attempts: 3
  backoff_base_seconds: 1.0
  backoff_max_seconds: 60.0
  jitter_seconds: 0.5
  retryable_status_codes:
    - 429  # Rate limited
    - 500  # Internal server error
    - 502  # Bad gateway
    - 503  # Service unavailable
    - 504  # Gateway timeout
  min_delay_on_429_seconds: 2.0

per_source:
  # TfL APIs - conservative retry
  tfl:
    max_attempts: 5
    backoff_base_seconds: 2.0
    backoff_max_seconds: 120.0
    jitter_seconds: 1.0
  
  tfl_arrivals:
    max_attempts: 3
    backoff_base_seconds: 1.0
    backoff_max_seconds: 30.0
  
  tfl_line_status:
    max_attempts: 3
    backoff_base_seconds: 1.0
    backoff_max_seconds: 30.0

  # Air Quality APIs
  openaq:
    max_attempts: 4
    backoff_base_seconds: 2.0
    backoff_max_seconds: 60.0
    min_delay_on_429_seconds: 5.0
  
  waqi:
    max_attempts: 3
    backoff_base_seconds: 1.5
    backoff_max_seconds: 45.0
  
  londonair:
    max_attempts: 3
    backoff_base_seconds: 1.0
    backoff_max_seconds: 30.0

  # Weather APIs
  openweather:
    max_attempts: 4
    backoff_base_seconds: 2.0
    backoff_max_seconds: 60.0
  
  openmeteo:
    max_attempts: 3
    backoff_base_seconds: 3.0
    backoff_max_seconds: 120.0
    min_delay_on_429_seconds: 10.0

  # Traffic/Safety APIs
  dft:
    max_attempts: 3
    backoff_base_seconds: 1.0
    backoff_max_seconds: 60.0
  
  stats19:
    max_attempts: 2
    backoff_base_seconds: 2.0
    backoff_max_seconds: 60.0
