# Polling Configuration
# Each source can be polled at its own interval

sources:
  # Transport Sources
  tfl:
    enabled: false
    interval_seconds: 300
    timeout_minutes: 10
    pool: tfl_pool
    backfill_on_restart: true
    backfill_gap_minutes: 30
  
  tfl_line_status:
    enabled: true
    interval_seconds: 300
    timeout_minutes: 5
    pool: tfl_pool
    backfill_on_restart: true
    backfill_gap_minutes: 30
  
  tfl_arrivals:
    enabled: true
    interval_seconds: 60
    timeout_minutes: 5
    pool: tfl_pool
    backfill_on_restart: true
    backfill_gap_minutes: 15
  
  tfl_status:
    enabled: false
    interval_seconds: 60
    timeout_minutes: 5
    pool: tfl_pool
    backfill_on_restart: true

  # Environment - Air Quality
  openaq:
    enabled: true
    interval_seconds: 180
    timeout_minutes: 10
    pool: openaq_pool
    backfill_on_restart: true
    backfill_gap_minutes: 60
  
  waqi:
    enabled: true
    interval_seconds: 300
    timeout_minutes: 10
    pool: waqi_pool
    backfill_on_restart: true
    backfill_gap_minutes: 60
  
  londonair:
    enabled: true
    interval_seconds: 600
    timeout_minutes: 15
    pool: londonair_pool
    backfill_on_restart: true
    backfill_gap_minutes: 120

  # Environment - Weather
  openweather:
    enabled: true
    interval_seconds: 300
    timeout_minutes: 10
    pool: openweather_pool
    backfill_on_restart: true
    backfill_gap_minutes: 60
  
  openmeteo:
    enabled: false
    interval_seconds: 0
    timeout_minutes: 30
    pool: default_pool
    backfill_on_restart: false

  # Other Sources (disabled by default)
  naptan:
    enabled: false
    interval_seconds: 0
    timeout_minutes: 30
    pool: default_pool
    backfill_on_restart: false
  
  london_journeys:
    enabled: false
    interval_seconds: 0
    timeout_minutes: 30
    pool: default_pool
    backfill_on_restart: false
  
  dft:
    enabled: false
    interval_seconds: 0
    timeout_minutes: 60
    pool: default_pool
    backfill_on_restart: false
  
  ncei:
    enabled: false
    interval_seconds: 0
    timeout_minutes: 30
    pool: default_pool
    backfill_on_restart: false
  
  stats19:
    enabled: false
    interval_seconds: 0
    timeout_minutes: 120
    pool: default_pool
    backfill_on_restart: false
