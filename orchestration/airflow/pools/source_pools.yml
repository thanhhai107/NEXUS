# Airflow Pool Definitions
# Each source gets its own pool to prevent resource contention

pools:
  default_pool:
    slots: 10
    description: "Default pool for miscellaneous tasks"
  
  openaq_pool:
    slots: 2
    description: "Pool for OpenAQ API polling"
  
  tfl_pool:
    slots: 5
    description: "Pool for TfL API polling (higher frequency)"
  
  waqi_pool:
    slots: 2
    description: "Pool for WAQI air quality API"
  
  openweather_pool:
    slots: 2
    description: "Pool for OpenWeather API"
  
  londonair_pool:
    slots: 2
    description: "Pool for London Air Quality API"
  
  kafka_pool:
    slots: 3
    description: "Pool for Kafka producer/consumer operations"
  
  streaming_pool:
    slots: 3
    description: "Pool for real-time streaming tasks"
  
  batch_pool:
    slots: 5
    description: "Pool for batch download tasks"
  
  recovery_pool:
    slots: 2
    description: "Pool for backfill and recovery tasks"
