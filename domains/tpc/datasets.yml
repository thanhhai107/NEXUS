datasets:
  # TPC-DS — Decision Support Benchmark (complex star/snowflake schemas)
  # Key tables for analytics workloads
  # =========================================================================
  tpcds_date_dim:
    domain: tpc
    description: TPC-DS Date dimension.
    nexus_demo:
      status: primary
      default_download: true
    source_type: data_caterer
    data_caterer_plan: tpcds_plan
    schema_path: domains/tpc/schemas/tpcds_date_dim.schema.json
    freshness_hours: 8760
    primary_keys:
      - d_date_sk
    governance:
      owner: tpc-data-platform
      steward: tpc-data-steward
      sensitivity: public
      retention:
        policy: benchmark-standard
        days: 365
      access_policy:
        allowed_roles:
          - admin
          - steward
          - analyst
        denied_roles: []
        api_access: true
        trino_access: true
    target:
      raw_path: s3a://nexus-lakehouse/bronze/tpcds/date_dim/
      bronze_table: nexus.bronze.tpcds_date_dim
      silver_table: nexus.silver.tpcds_date_dim
      gold_table: nexus.gold.tpcds_date_dim_summary

