datasets:
  # TPC-DI — Data Integration Benchmark (ETL/ELT pipeline)
  # Simulates broker/dealer data integration from multiple sources
  # =========================================================================

  # ── Core Dimensions ────────────────────────────────────────────────────────
  tpcdi_dim_date:
    domain: tpc
    description: 'TPC-DI Date dimension (18 fields, SF=3: 25,933 rows).'
    nexus_demo:
      status: primary
      default_download: true
    source_type: tpcdi_digen
    source_config: domains/tpc/tpcdi_sources.yml
    source_root_template: runtime/tpcdi/sf{scale_factor}
    source_mappings:
      - source_name: date
        batches: [batch1]
    schema_path: domains/tpc/schemas/tpcdi_dim_date.schema.json
    freshness_hours: 8760
    primary_keys:
      - sk_date
    governance:
      owner: tpc-data-platform
      steward: tpc-data-steward
      sensitivity: public
      retention: { policy: benchmark-standard, days: 365 }
      access_policy:
        allowed_roles: [admin, steward, analyst]
        denied_roles: []
        api_access: true
        trino_access: true
    target:
      raw_path: s3a://nexus-lakehouse/bronze/tpcdi/dim_date/
      bronze_table: nexus.bronze.tpcdi_dim_date
      silver_table: nexus.silver.tpcdi_dim_date
      gold_table: nexus.gold.tpcdi_dim_date

