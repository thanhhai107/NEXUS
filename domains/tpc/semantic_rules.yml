# =============================================================================
# TPC-DI Benchmark Domain — Semantic Rules
# =============================================================================

datasets:
  # ── Core Dimensions ────────────────────────────────────────────────────────
  tpcdi_dim_date:
    semantic_rules:
      - field: sk_date
        business_name: Date Key
        description: Surrogate key for the date dimension.
        data_type: INTEGER
        pii: false
      - field: date
        business_name: Calendar Date
        description: Calendar date in YYYY-MM-DD format.
        data_type: DATE
        pii: false
      - field: year
        business_name: Year
        description: Calendar year (2015-2021).
        data_type: INTEGER
        pii: false
      - field: quarter
        business_name: Quarter
        description: Calendar quarter (1-4).
        data_type: INTEGER
        pii: false

  tpcdi_dim_time:
    semantic_rules:
      - field: sk_time
        business_name: Time Key
        description: Surrogate key representing a second of the day.
      - field: time
        business_name: Time of Day
        description: Time in HH:MM:SS format.
      - field: hour
        business_name: Hour
        description: Hour component (0-23).
      - field: minute
        business_name: Minute
        description: Minute component (0-59).

  tpcdi_dim_account:
    semantic_rules:
      - field: sk_accountid
        business_name: Account Key
        description: Surrogate key for brokerage accounts.
      - field: sk_customerid
        business_name: Customer Key
        description: Foreign key to the customer dimension.
      - field: status
        business_name: Account Status
        description: Current account status (ACTIVE/CLOSED/PENDING).
      - field: taxstatus
        business_name: Tax Status Code
        description: Tax reporting status for the account.

  tpcdi_dim_broker:
    semantic_rules:
      - field: sk_brokerid
        business_name: Broker Key
        description: Surrogate key for brokers.
      - field: lastname
        business_name: Broker Last Name
      - field: firstname
        business_name: Broker First Name
      - field: branch
        business_name: Branch Office
        description: Branch office identifier.

  tpcdi_dim_customer:
    semantic_rules:
      - field: sk_customerid
        business_name: Customer Key
        description: Surrogate key with SCD Type 2 tracking.
      - field: customerid
        business_name: Customer ID
        description: Business key for the customer.
      - field: taxid
        business_name: Tax ID
        description: SSN/Tax identifier (PII).
        pii: true
      - field: lastname
        business_name: Last Name
        pii: true
      - field: firstname
        business_name: First Name
        pii: true
      - field: email
        business_name: Email Address
        pii: true
      - field: phone1
        business_name: Primary Phone
        pii: true
      - field: dob
        business_name: Date of Birth
        pii: true
      - field: c_credit_score
        business_name: Credit Score
        description: FICO credit score (300-850).
        pii: true
      - field: tier
        business_name: Customer Tier
        description: Service tier (1=Standard, 2=Premium, 3=VIP).
      - field: iscurrent
        business_name: Current Record Flag
        description: SCD Type 2 — true for the current version of the record.

  tpcdi_dim_security:
    semantic_rules:
      - field: sk_securityid
        business_name: Security Key
        description: Surrogate key with SCD Type 2 tracking.
      - field: symbol
        business_name: Ticker Symbol
        description: Exchange ticker symbol (3-5 uppercase).
      - field: issue
        business_name: Issue Type
        description: Security type (COMMON/PREFERRED/BOND/ETF).
      - field: exchangeid
        business_name: Exchange
        description: Primary exchange (NYSE/NASDAQ/AMEX/LSE).
      - field: dividend
        business_name: Dividend Yield
        description: Annual dividend per share.
      - field: sharesoutstanding
        business_name: Shares Outstanding
        description: Total shares currently outstanding.

  tpcdi_dim_company:
    semantic_rules:
      - field: sk_companyid
        business_name: Company Key
      - field: companyid
        business_name: Company ID
        description: Business key for the company.
      - field: name
        business_name: Company Name
      - field: industryid
        business_name: Industry Code
        description: Foreign key to the industry reference.
      - field: sprating
        business_name: S&P Rating
        description: Standard & Poor's credit rating.
      - field: ceo
        business_name: CEO Name
      - field: foundingdate
        business_name: Founding Date

  tpcdi_dim_trade:
    semantic_rules:
      - field: sk_tradeid
        business_name: Trade Key
        description: Surrogate key with SCD Type 2 tracking.
      - field: tradeid
        business_name: Trade ID
        description: Unique trade identifier.
      - field: trade_price
        business_name: Trade Price
        description: Execution price per share.
      - field: trade_quantity
        business_name: Trade Quantity
        description: Number of shares traded.
      - field: trade_dts
        business_name: Trade Timestamp
        description: Date and time the trade was executed.
      - field: trade_status
        business_name: Trade Status
        description: Order status (COMPLETED/CANCELLED/PENDING).
      - field: trade_type
        business_name: Trade Type
        description: BUY or SELL.

  # ── Fact Tables ────────────────────────────────────────────────────────────
  tpcdi_fact_cash_balances:
    semantic_rules:
      - field: sk_customerid
        business_name: Customer Key
      - field: sk_accountid
        business_name: Account Key
      - field: sk_date
        business_name: Balance Date
      - field: cash
        business_name: Cash Balance
        description: End-of-day cash balance in account currency.

  tpcdi_fact_holdings:
    semantic_rules:
      - field: sk_tradeid
        business_name: Trade Key
      - field: sk_securityid
        business_name: Security Key
      - field: holding_quantity
        business_name: Quantity Held
        description: Number of shares held.
      - field: holding_price
        business_name: Current Price
        description: Mark-to-market price per share.

  tpcdi_fact_market_history:
    semantic_rules:
      - field: sk_securityid
        business_name: Security Key
      - field: sk_date
        business_name: Trading Date
      - field: close_price
        business_name: Closing Price
      - field: day_high
        business_name: Day High
      - field: day_low
        business_name: Day Low
      - field: volume
        business_name: Trading Volume
      - field: pe_ratio
        business_name: P/E Ratio
        description: Price-to-earnings ratio.

  tpcdi_fact_watches:
    semantic_rules:
      - field: sk_customerid
        business_name: Customer Key
      - field: sk_securityid
        business_name: Security Key
        description: Security being watched by the customer.

  # ── Reference Tables ───────────────────────────────────────────────────────
  tpcdi_industry:
    semantic_rules:
      - field: in_id
        business_name: Industry ID
      - field: in_name
        business_name: Industry Name
        description: Industry classification (e.g., Technology, Finance, Healthcare).

  tpcdi_status_type:
    semantic_rules:
      - field: st_id
        business_name: Status ID
      - field: st_name
        business_name: Status Name
        description: Lookup status value.

  tpcdi_tax_rate:
    semantic_rules:
      - field: tx_id
        business_name: Tax Rate ID
      - field: tx_name
        business_name: Tax Rate Name
      - field: tx_rate
        business_name: Tax Rate
        description: Tax rate as a decimal (0.00 to 0.40).

  tpcdi_trade_type:
    semantic_rules:
      - field: tt_id
        business_name: Trade Type ID
      - field: tt_name
        business_name: Trade Type Name
      - field: tt_is_sell
        business_name: Is Sell Order
      - field: tt_is_mrkt
        business_name: Is Market Order

  tpcdi_prospect:
    semantic_rules:
      - field: agencyid
        business_name: Agency ID
      - field: lastname
        business_name: Last Name
        pii: true
      - field: firstname
        business_name: First Name
        pii: true
      - field: income
        business_name: Annual Income
        pii: true
      - field: creditrating
        business_name: Credit Rating
        pii: true
      - field: networth
        business_name: Net Worth
        pii: true
      - field: iscustomer
        business_name: Is Existing Customer
