# TPC-DI DIGen source file definitions
#
# Describes source files generated by the TPC-DI DIGen tool (SF=3).
# This file does NOT generate data — it describes existing files.
# All source files have NO header row (has_header: false).
#
# Source: TPC-DI v1.1.0 specification
# Generated: 2026-06-07

tpcdi:
  source_root: runtime/tpcdi/sf3
  scale_factor: 3
  defaults:
    skip_blank_lines: true

  batches:
    batch1:
      id: 1
      type: historical_load
      path: Batch1
    batch2:
      id: 2
      type: incremental_update_1
      path: Batch2
    batch3:
      id: 3
      type: incremental_update_2
      path: Batch3

  sources:

    # ── Reference tables (batch1 only) ────────────────────────────────
    status_type:
      batches: [batch1]
      files: ["StatusType.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns: ["st_id", "st_name"]

    trade_type:
      batches: [batch1]
      files: ["TradeType.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns: ["tt_id", "tt_name", "tt_is_sell", "tt_is_mrkt"]

    tax_rate:
      batches: [batch1]
      files: ["TaxRate.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns: ["tx_id", "tx_name", "tx_rate"]

    industry:
      batches: [batch1]
      files: ["Industry.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns: ["in_id", "in_name", "in_sector"]

    # ── Date/Time dimensions (batch1 only) ────────────────────────────
    date:
      batches: [batch1]
      files: ["Date.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns:
        - "sk_date"
        - "date_value"
        - "date_desc"
        - "year"
        - "month_num"
        - "month_of_year"
        - "quarter_name"
        - "quarter"
        - "month_name"
        - "month_of_year_2"
        - "week_of_year"
        - "day_of_week_num"
        - "day_of_week_name"
        - "fiscal_year"
        - "fiscal_quarter"
        - "fiscal_year_quarter"
        - "fiscal_period"
        - "holiday_flag"

    time:
      batches: [batch1]
      files: ["Time.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns:
        - "sk_time"
        - "time_value"
        - "hour"
        - "minute"
        - "second"
        - "hh_mm"
        - "minute_of_day"
        - "hh_mm_ss"
        - "is_work_hour"
        - "is_night_hour"

    # ── HR (batch1 only) ─────────────────────────────────────────────
    hr:
      batches: [batch1]
      files: ["HR.csv"]
      format: csv
      delimiter: ","
      has_header: false
      columns:
        - "employee_id"
        - "manager_id"
        - "employee_last_name"
        - "employee_first_name"
        - "employee_mi"
        - "employee_job_code"
        - "employee_branch"
        - "employee_office"
        - "employee_phone"

    # ── Prospect (all batches) ───────────────────────────────────────
    prospect:
      batches: [batch1, batch2, batch3]
      files: ["Prospect.csv"]
      format: csv
      delimiter: ","
      has_header: false
      columns:
        - "agency_id"
        - "last_name"
        - "first_name"
        - "middle_initial"
        - "gender"
        - "address_line1"
        - "address_line2"
        - "postal_code"
        - "city"
        - "state_province"
        - "country"
        - "phone"
        - "income"
        - "number_cars"
        - "number_children"
        - "marital_status"
        - "age"
        - "credit_rating"
        - "own_or_rent_flag"
        - "employer"
        - "number_credit_cards"
        - "net_worth"

    # ── Customer Mgmt XML (batch1 only) ─────────────────────────────
    customer_mgmt:
      batches: [batch1]
      files: ["CustomerMgmt.xml"]
      format: xml
      has_header: false
      columns: []

    # ── Customer/Account incremental (batch2, batch3, no header) ────
    customer_update:
      batches: [batch2, batch3]
      files: ["Customer.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns:
        - "action_type"
        - "customer_id"
        - "tax_id"
        - "national_tax_id"
        - "status"
        - "last_name"
        - "first_name"
        - "middle_initial"
        - "gender"
        - "tier"
        - "dob"
        - "address_line1"
        - "address_line2"
        - "postal_code"
        - "city"
        - "state_province"
        - "country"
        - "phone1"
        - "phone2"
        - "phone3"
        - "local_tax_id_1"
        - "local_tax_id_2"
        - "local_tax_id_3"
        - "local_tax_id_4"
        - "email1"
        - "email2"
        - "local_tax_id_5"
        - "local_tax_id_6"
        - "local_tax_id_7"
        - "local_tax_id_8"
        - "local_tax_id_9"
        - "local_tax_id_10"
        - "local_tax_id_11"

    account_update:
      batches: [batch2, batch3]
      files: ["Account.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns:
        - "action_type"
        - "account_id"
        - "customer_id"
        - "broker_id"
        - "account_name"
        - "account_tax_status"
        - "account_desc"
        - "account_status"

    # ── FINWIRE (batch1, fixed-width sections) ──────────────────────
    finwire:
      batches: [batch1]
      files: ["FINWIRE*"]
      exclude_patterns: ["*_audit.csv"]
      format: sectioned
      has_header: false
      columns: []

    # ── Daily Market (all batches) ──────────────────────────────────
    daily_market:
      batches: [batch1, batch2, batch3]
      files: ["DailyMarket.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns:
        - "dm_date"
        - "dm_s_symb"
        - "dm_close"
        - "dm_high"
        - "dm_low"
        - "dm_volume"

    # ── Trade (all batches) ─────────────────────────────────────────
    trade:
      batches: [batch1, batch2, batch3]
      files: ["Trade.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns:
        - "trade_id"
        - "trade_dts"
        - "status"
        - "ttype"
        - "is_cash"
        - "s_symbol"
        - "trade_quantity"
        - "trade_price"
        - "execution_id"
        - "execution_broker_id"
        - "cash_amount"
        - "fee"
        - "commission"
        - "tax"

    trade_history:
      batches: [batch1]
      files: ["TradeHistory.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      skip_blank_lines: true
      columns:
        - "th_trade_id"
        - "th_dts"
        - "th_status"

    # ── Cash Transaction (all batches) ──────────────────────────────
    cash_transaction:
      batches: [batch1, batch2, batch3]
      files: ["CashTransaction.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns:
        - "ct_ca_id"
        - "ct_dts"
        - "ct_amt"
        - "ct_name"

    # ── Holding History (all batches) ───────────────────────────────
    holding_history:
      batches: [batch1, batch2, batch3]
      files: ["HoldingHistory.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      columns:
        - "hh_h_t_id"
        - "hh_t_id"
        - "hh_before_qty"
        - "hh_after_qty"

    # ── Watch History (all batches) ─────────────────────────────────
    watch_history:
      batches: [batch1, batch2, batch3]
      files: ["WatchHistory.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      skip_blank_lines: true
      columns:
        - "wh_c_id"
        - "wh_s_symb"
        - "wh_dts"
        - "wh_action"

    # ── Batch date marker (control/metadata, not ingest) ────────────
    batch_date:
      batches: [batch1, batch2, batch3]
      files: ["BatchDate.txt"]
      format: delimited
      delimiter: "|"
      has_header: false
      source_kind: control
      ingest: false
      columns: ["batch_date"]

  # ── Reports / audit files (not source data) ───────────────────────
  reports:
    digen_report:
      path: digen_report.txt
      format: text

    batch_audits:
      files:
        - Batch1_audit.csv
        - Batch2_audit.csv
        - Batch3_audit.csv
      format: csv
      delimiter: ","
      has_header: true

    generator_audit:
      file: Generator_audit.csv
      format: csv
      delimiter: ","
      has_header: true
