# =============================================================================
# TPC-DI Benchmark Domain — Quality Rules
# =============================================================================

default_rules:
  max_missing_ratio: 0.05
  max_duplicate_ratio: 0.02
  min_freshness_score: 0.9

datasets:
  # ── Core Dimensions ────────────────────────────────────────────────────────
  tpcdi_dim_date:
    required_columns: [sk_date, date, year, month_of_year, quarter]
    freshness_column: date
    primary_keys: [sk_date]

  tpcdi_dim_time:
    required_columns: [sk_time, time, hour, minute, second]
    freshness_column: sk_time
    primary_keys: [sk_time]

  tpcdi_dim_account:
    required_columns: [sk_accountid, accountid, sk_customerid, sk_brokerid, status, iscurrent]
    freshness_column: effectivedate
    primary_keys: [sk_accountid]

  tpcdi_dim_broker:
    required_columns: [sk_brokerid, brokerid, lastname, firstname, status, iscurrent]
    freshness_column: effectivedate
    primary_keys: [sk_brokerid]

  tpcdi_dim_customer:
    required_columns: [sk_customerid, customerid, lastname, firstname, gender, status, iscurrent]
    freshness_column: effectivedate
    primary_keys: [sk_customerid]

  tpcdi_dim_security:
    required_columns: [sk_securityid, symbol, issue, status, sk_companyid, iscurrent]
    freshness_column: effectivedate
    primary_keys: [sk_securityid]

  tpcdi_dim_company:
    required_columns: [sk_companyid, companyid, name, status, industryid, iscurrent]
    freshness_column: effectivedate
    primary_keys: [sk_companyid]

  tpcdi_dim_trade:
    required_columns: [sk_tradeid, tradeid, sk_accountid, sk_securityid, trade_status, trade_type, trade_dts]
    freshness_column: trade_dts
    primary_keys: [sk_tradeid]

  # ── Fact Tables ────────────────────────────────────────────────────────────
  tpcdi_fact_cash_balances:
    required_columns: [sk_customerid, sk_accountid, sk_date, cash]
    freshness_column: sk_date
    primary_keys: [sk_customerid, sk_accountid, sk_date]

  tpcdi_fact_holdings:
    required_columns: [sk_tradeid, sk_customerid, sk_securityid, sk_closedate, holding_quantity, holding_price]
    freshness_column: sk_closedate
    primary_keys: [sk_tradeid, sk_customerid, sk_securityid, sk_closedate]

  tpcdi_fact_market_history:
    required_columns: [sk_securityid, sk_date, close_price, day_high, day_low, volume]
    freshness_column: sk_date
    primary_keys: [sk_securityid, sk_date]

  tpcdi_fact_watches:
    required_columns: [sk_customerid, sk_securityid]
    freshness_column: sk_closedate
    primary_keys: [sk_customerid, sk_securityid]

  # ── Reference Tables ───────────────────────────────────────────────────────
  tpcdi_industry:
    required_columns: [in_id, in_name]
    freshness_column: null
    primary_keys: [in_id]

  tpcdi_status_type:
    required_columns: [st_id, st_name]
    freshness_column: null
    primary_keys: [st_id]

  tpcdi_tax_rate:
    required_columns: [tx_id, tx_name, tx_rate]
    freshness_column: null
    primary_keys: [tx_id]

  tpcdi_trade_type:
    required_columns: [tt_id, tt_name]
    freshness_column: null
    primary_keys: [tt_id]

  tpcdi_prospect:
    required_columns: [agencyid, lastname, firstname, gender, age, creditrating]
    freshness_column: sk_updatedateid
    primary_keys: [agencyid]
