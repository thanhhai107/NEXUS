datasets:
  openaq_measurements:
    domain: environment
    description: Environment poll-based streaming source for air-quality measurements
      from OpenAQ.
    nexus_demo:
      status: primary
      default_download: true
      scope: greater_london
      layers:
      - historical_environment
      modes:
      - small_demo
      - full_demo
    source_type: api_stream
    source_uri: https://api.openaq.org/v3/measurements
    local_sample_uri: assets/samples/openaq_measurements.csv
    docs_uri: https://docs.openaq.org/
    api_key_env: OPENAQ_API_KEY
    topic: environment-openaq
    poll_seconds: 60
    schema_path: domains/environment/schemas/openaq_measurements.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: OpenAQ
      source_file: assets/source_discovery/schemas/OpenAQ_schemas.json
      schema_names:
      - OpenAQ_OpenAQ_Location
      - OpenAQ_OpenAQ_Sensor
      - OpenAQ_OpenAQ_Parameter
    freshness_hours: 6
    primary_keys:
    - location_id
    - parameter
    - datetime
    governance:
      owner: environment-data-platform
      steward: environment-data-steward
      sensitivity: public
      retention:
        policy: open-data-standard
        days: 365
      access_policy:
        allowed_roles:
        - admin
        - steward
        - analyst
        - public
        denied_roles: []
        api_access: true
        trino_access: true
        superset_access: true
    target:
      raw_path: s3a://nexus-lakehouse/raw/openaq_measurements/
      bronze_table: nexus.bronze.openaq_measurements
      silver_table: nexus.silver.openaq_measurements
      gold_table: nexus.gold.openaq_air_quality_summary
  waqi_air_quality:
    domain: environment
    description: Environment real-time air quality stream from the World Air Quality
      Index project.
    nexus_demo:
      status: primary_realtime_snapshot
      default_download: true
      scope: greater_london
      layers:
      - realtime_snapshot
      modes:
      - small_demo
      - full_demo
    source_type: api_stream
    source_uri: https://api.waqi.info/feed/{city}/?token=${WAQI_API_TOKEN}
    local_sample_uri: assets/samples/waqi_air_quality.csv
    docs_uri: https://aqicn.org/api/
    api_key_env: WAQI_API_TOKEN
    topic: environment-waqi
    poll_seconds: 60
    schema_path: domains/environment/schemas/waqi_air_quality.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: WAQI
      source_file: assets/source_discovery/schemas/WAQI_schemas.json
      schema_names:
      - WAQI_WAQI_AQIResponse
      - WAQI_WAQI_StationData
      - WAQI_WAQI_TimeData
    freshness_hours: 1
    primary_keys:
    - station_uid
    - observed_at
    target:
      raw_path: s3a://nexus-lakehouse/raw/waqi_air_quality/
      bronze_table: nexus.bronze.waqi_air_quality
      silver_table: nexus.silver.waqi_air_quality
      gold_table: nexus.gold.waqi_air_quality_hourly
  ncei_cdo_climate:
    domain: environment
    description: Environment climate observations from NOAA NCEI Climate Data Online.
    nexus_demo:
      status: supporting
      default_download: true
      scope: greater_london
      layers:
      - historical_environment
      modes:
      - small_demo
      - full_demo
    source_type: rest_api
    source_uri: https://www.ncei.noaa.gov/cdo-web/api/v2/data
    local_sample_uri: assets/samples/ncei_cdo_climate.csv
    docs_uri: https://www.ncei.noaa.gov/cdo-web/webservices/v2
    api_key_env: NCEI_API_TOKEN
    schema_path: domains/environment/schemas/ncei_cdo_climate.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: NCEI
      source_file: assets/source_discovery/schemas/NCEI_schemas.json
      schema_names:
      - NCEI_NCEI_ClimateRecord
      - NCEI_NCEI_Station
      - NCEI_NCEI_Dataset
    freshness_hours: 720
    primary_keys:
    - station
    - date
    - datatype
    target:
      raw_path: s3a://nexus-lakehouse/raw/ncei_cdo_climate/
      bronze_table: nexus.bronze.ncei_cdo_climate
      silver_table: nexus.silver.ncei_cdo_climate
      gold_table: nexus.gold.ncei_climate_summary
  londonair_monitoring:
    domain: environment
    description: London Air Quality Network hourly monitoring index from Imperial College API.
    nexus_demo:
      status: primary
      default_download: true
      scope: greater_london
      layers:
      - historical_environment
      modes:
      - small_demo
      - full_demo
    source_type: api_stream
    source_uri: ${LONDONAIR_API_BASE_URL}/Hourly/MonitoringIndex/GroupName=London/Json
    local_sample_uri: assets/samples/londonair_monitoring.csv
    docs_uri: https://api.erg.ic.ac.uk/AirQuality/help
    topic: environment-londonair
    poll_seconds: 3600
    schema_path: domains/environment/schemas/londonair_monitoring.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: LondonAir
      source_file: assets/source_discovery/schemas/LondonAir_schemas.json
      schema_names:
      - LondonAir_LondonAir_MonitoringIndex
      - LondonAir_LondonAir_Site
      - LondonAir_LondonAir_Species
    freshness_hours: 6
    primary_keys:
    - event_id
    governance:
      owner: environment-data-platform
      steward: environment-data-steward
      sensitivity: public
      retention:
        policy: open-data-standard
        days: 365
      access_policy:
        allowed_roles:
        - admin
        - steward
        - analyst
        - public
        denied_roles: []
        api_access: true
        trino_access: true
        superset_access: true
    target:
      raw_path: s3a://nexus-lakehouse/raw/londonair_monitoring/
      bronze_table: nexus.bronze.londonair_monitoring
      silver_table: nexus.silver.londonair_monitoring
      gold_table: nexus.gold.londonair_air_quality_summary
  openmeteo_air_quality:
    domain: environment
    description: Open-Meteo air quality forecast and current readings.
    nexus_demo:
      status: primary
      default_download: true
      scope: greater_london
      layers:
      - historical_environment
      modes:
      - small_demo
      - full_demo
    source_type: api_stream
    source_uri: ${OPENMETEO_API_URL}/v1/air-quality
    local_sample_uri: assets/samples/openmeteo_air_quality.csv
    docs_uri: https://open-meteo.com/en/docs/air-quality-api
    topic: environment-openmeteo
    poll_seconds: 3600
    schema_path: domains/environment/schemas/openmeteo_air_quality.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: OpenMeteo
      source_file: assets/source_discovery/schemas/OpenMeteo_schemas.json
      schema_names:
      - OpenMeteo_OpenMeteo_ForecastResponse
      - OpenMeteo_OpenMeteo_AirQualityResponse
    freshness_hours: 6
    primary_keys:
    - event_id
    governance:
      owner: environment-data-platform
      steward: environment-data-steward
      sensitivity: public
      retention:
        policy: open-data-standard
        days: 365
      access_policy:
        allowed_roles:
        - admin
        - steward
        - analyst
        - public
        denied_roles: []
        api_access: true
        trino_access: true
        superset_access: true
    target:
      raw_path: s3a://nexus-lakehouse/raw/openmeteo_air_quality/
      bronze_table: nexus.bronze.openmeteo_air_quality
      silver_table: nexus.silver.openmeteo_air_quality
      gold_table: nexus.gold.openmeteo_air_quality_summary
  openweather_current:
    domain: environment
    description: OpenWeatherMap current weather data for London.
    nexus_demo:
      status: supporting_realtime_snapshot
      default_download: true
      scope: greater_london
      layers:
      - realtime_snapshot
      modes:
      - small_demo
      - full_demo
    source_type: api_stream
    source_uri: ${OPENWEATHER_API_URL}/data/2.5/weather
    local_sample_uri: assets/samples/openweather_current.csv
    docs_uri: https://openweathermap.org/current
    api_key_env: OPENWEATHER_API_KEY
    topic: environment-openweather
    poll_seconds: 1800
    schema_path: domains/environment/schemas/openweather_current.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: OpenWeather
      source_file: assets/source_discovery/schemas/OpenWeather_schemas.json
      schema_names:
      - OpenWeather_OpenWeather_Current
      - OpenWeather_OpenWeather_OneCallResponse
    freshness_hours: 1
    primary_keys:
    - event_id
    governance:
      owner: environment-data-platform
      steward: environment-data-steward
      sensitivity: public
      retention:
        policy: open-data-standard
        days: 365
      access_policy:
        allowed_roles:
        - admin
        - steward
        - analyst
        - public
        denied_roles: []
        api_access: true
        trino_access: true
        superset_access: true
    target:
      raw_path: s3a://nexus-lakehouse/raw/openweather_current/
      bronze_table: nexus.bronze.openweather_current
      silver_table: nexus.silver.openweather_current
      gold_table: nexus.gold.openweather_current_summary
  ukair_air_quality_archive:
    domain: environment
    description: DEFRA UK-AIR air quality monitoring archive. Downloads CSV measurement
      files (hourly and daily) from London monitoring sites for pollutants including
      NO2, PM10, PM2.5, O3, SO2, and CO.
    nexus_demo:
      status: primary
      default_download: true
    source_type: csv_download
    source_uri: https://uk-air.defra.gov.uk/data/flat_files
    docs_uri: https://uk-air.defra.gov.uk/data/
    poll_seconds: 86400
    schema_path: domains/environment/schemas/ukair_air_quality_archive.schema.json
    freshness_hours: 24
    primary_keys:
    - event_id
    target:
      raw_path: s3a://nexus-lakehouse/raw/ukair_air_quality_archive/
      bronze_table: nexus.bronze.ukair_air_quality_archive
      silver_table: nexus.silver.ukair_air_quality_archive
      gold_table: nexus.gold.ukair_air_quality_archive_daily

  openmeteo_historical_weather:
    domain: environment
    description: Historical weather and air quality data from Open-Meteo Archive API
      across a London bbox grid (10 km spacing). Includes hourly and daily aggregates
      of temperature, precipitation, wind, pressure, radiation, and air quality.
    nexus_demo:
      status: primary
      default_download: true
    source_type: csv_download
    source_uri: https://archive-api.open-meteo.com/v1/archive
    docs_uri: https://open-meteo.com/en/docs/historical-weather-api
    poll_seconds: 86400
    schema_path: domains/environment/schemas/openmeteo_historical_weather.schema.json
    freshness_hours: 24
    primary_keys:
    - event_id
    target:
      raw_path: s3a://nexus-lakehouse/raw/openmeteo_historical_weather/
      bronze_table: nexus.bronze.openmeteo_historical_weather
      silver_table: nexus.silver.openmeteo_historical_weather
      gold_table: nexus.gold.openmeteo_historical_weather_daily
