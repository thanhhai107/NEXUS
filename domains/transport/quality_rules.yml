datasets:
  us_accidents:
    required_columns:
    - ID
    - Severity
    - Start_Time
    - Start_Lat
    - Start_Lng
    - State
    freshness_column: Start_Time
    auto_fix:
      trim_strings: true
      normalize_column_names: true
  nyc_tlc_trips:
    required_columns:
    - VendorID
    - tpep_pickup_datetime
    - tpep_dropoff_datetime
    - passenger_count
    - trip_distance
    freshness_column: tpep_pickup_datetime
    auto_fix:
      trim_strings: true
      normalize_column_names: true
  transport_events:
    required_columns:
    - event_id
    - source
    - event_type
    - event_time
    freshness_column: event_time
  tfl_transport_status:
    required_columns:
    - event_id
    - source
    - event_type
    - event_time
    freshness_column: event_time
  gtfs_realtime_events:
    required_columns:
    - event_id
    - source
    - event_type
    - event_time
    freshness_column: event_time
  sg_traffic:
    required_columns:
    - event_id
    - source
    - event_type
    - event_time
    freshness_column: event_time
