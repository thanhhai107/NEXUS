datasets:
  us_accidents:
    domain: transport
    description: Primary Transport batch dataset based on Kaggle US Accidents.
    nexus_demo:
      status: deprecated_out_of_scope
      default_download: false
      reason: Not in Greater London; retained only as a reference/sample dataset.
    source_type: kaggle_csv
    source_uri: https://www.kaggle.com/datasets/sobhanmoosavi/us-accidents
    local_sample_uri: assets/samples/us_accidents_sample.csv
    schema_path: domains/transport/schemas/us_accidents.schema.json
    freshness_hours: 24
    primary_keys:
    - ID
    governance:
      owner: transport-data-platform
      steward: transport-data-steward
      sensitivity: public
      retention:
        policy: open-data-standard
        days: 365
      access_policy:
        allowed_roles:
        - admin
        - steward
        - analyst
        - public
        denied_roles: []
        api_access: true
        trino_access: true
        superset_access: true
    target:
      raw_path: s3a://nexus-lakehouse/raw/us_accidents/
      bronze_table: nexus.bronze.us_accidents
      silver_table: nexus.silver.us_accidents
      gold_table: nexus.gold.us_accidents_summary
  nyc_tlc_trips:
    domain: transport
    description: Secondary Transport batch dataset based on NYC TLC trip records.
    nexus_demo:
      status: deprecated_out_of_scope
      default_download: false
      reason: Not in Greater London; retained only as a reference/sample dataset.
    source_type: parquet_batch
    source_uri: https://www.nyc.gov/site/tlc/about/tlc-trip-record-data.page
    local_sample_uri: assets/samples/nyc_tlc_trips.csv
    schema_path: domains/transport/schemas/nyc_tlc_trips.schema.json
    freshness_hours: 4320
    primary_keys:
    - VendorID
    - tpep_pickup_datetime
    - tpep_dropoff_datetime
    - PULocationID
    - DOLocationID
    target:
      raw_path: s3a://nexus-lakehouse/raw/nyc_tlc_trips/
      bronze_table: nexus.bronze.nyc_tlc_trips
      silver_table: nexus.silver.nyc_tlc_trips
      gold_table: nexus.gold.nyc_tlc_trips_summary
  transport_events:
    domain: transport
    description: Transport streaming events from a real-time API, with simulated producer
      fallback.
    nexus_demo:
      status: fallback_simulated
      default_download: false
      reason: Synthetic stream fallback; no external London download required.
    source_type: api_stream
    source_uri: ${TRANSPORT_EVENTS_API_URL}
    local_sample_uri: assets/samples/transport_events.csv
    fallback_source: simulated_kafka_producer
    topic: transport-events
    schema_path: domains/transport/schemas/transport_events.schema.json
    freshness_hours: 1
    primary_keys:
    - event_id
    governance:
      owner: transport-data-platform
      steward: transport-data-steward
      sensitivity: internal
      retention:
        policy: internal-event-standard
        days: 90
      access_policy:
        allowed_roles:
        - admin
        - steward
        - analyst
        denied_roles:
        - public
        api_access: true
        trino_access: true
        superset_access: true
    target:
      raw_path: s3a://nexus-lakehouse/raw/transport_events/
      bronze_table: nexus.bronze.transport_events
      silver_table: nexus.silver.transport_events
      gold_table: nexus.gold.transport_events_hourly
  tfl_transport_status:
    domain: transport
    description: Transport for London line status and disruption stream.
    nexus_demo:
      status: primary_realtime_snapshot
      default_download: true
      scope: greater_london
      layers:
      - realtime_snapshot
      modes:
      - small_demo
      - full_demo
    source_type: api_stream
    source_uri: https://api.tfl.gov.uk/Line/Mode/tube,dlr,overground,elizabeth-line/Status
    local_sample_uri: assets/samples/tfl_transport_status.csv
    docs_uri: https://api.tfl.gov.uk
    api_key_env: TFL_API_KEY
    topic: transport-tfl
    poll_seconds: 60
    schema_path: domains/transport/schemas/tfl_transport_status.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: TfL Unified API
      source_file: assets/source_discovery/schemas/TfL_Unified_API_schemas.json
      schema_names:
      - TfL_Unified_API_Tfl.Api.Presentation.Entities.Line
      - TfL_Unified_API_Tfl.Api.Presentation.Entities.LineStatus
      - TfL_Unified_API_Tfl.Api.Presentation.Entities.Disruption
    freshness_hours: 1
    primary_keys:
    - event_id
    target:
      raw_path: s3a://nexus-lakehouse/raw/tfl_transport_status/
      bronze_table: nexus.bronze.tfl_transport_status
      silver_table: nexus.silver.tfl_transport_status
      gold_table: nexus.gold.tfl_transport_status_hourly
  tfl_line_status:
    domain: transport
    description: TfL Unified API line status, routes, and disruptions polled every 5 minutes.
    nexus_demo:
      status: primary_realtime_stream
      default_download: true
      scope: greater_london
      layers:
      - realtime_polling
      modes:
      - small_demo
      - full_demo
    source_type: api_stream
    source_uri: https://api.tfl.gov.uk/Line/{ids}/Status
    docs_uri: https://api.tfl.gov.uk
    api_key_env: TFL_API_KEY
    auth: optional_app_key
    topic: nexus.raw.transport.tfl.line_status
    poll_seconds: 300
    schema_path: domains/transport/schemas/tfl_line_status.schema.json
    freshness_hours: 1
    primary_keys:
    - event_id
    target:
      raw_path: s3a://nexus-lakehouse/raw/tfl_line_status/
      bronze_table: nexus.bronze.tfl_line_status
      silver_table: nexus.silver.tfl_line_status
      gold_table: nexus.gold.tfl_line_status_hourly
  tfl_arrivals:
    domain: transport
    description: TfL Unified API live arrival predictions for selected StopPoint IDs.
    nexus_demo:
      status: primary_realtime_stream
      default_download: true
      scope: greater_london
      layers:
      - realtime_polling
      modes:
      - small_demo
      - full_demo
    source_type: api_stream
    source_uri: https://api.tfl.gov.uk/StopPoint/{stopId}/Arrivals
    docs_uri: https://api.tfl.gov.uk
    api_key_env: TFL_API_KEY
    auth: optional_app_key
    topic: nexus.raw.transport.tfl.arrivals
    poll_seconds: 60
    schema_path: domains/transport/schemas/tfl_arrivals.schema.json
    freshness_hours: 1
    primary_keys:
    - vehicle_id
    - line_id
    - expected_arrival
    semantic_dedup_keys:
    - vehicle_id
    - line_id
    - expected_arrival
    late_data_policy:
      event_time_field: expected_arrival
      watermark: 30 minutes
      aggregation_window: 5 minutes
    target:
      raw_path: s3a://nexus-lakehouse/raw/tfl_arrivals/
      bronze_table: nexus.bronze.tfl_arrivals
      silver_table: nexus.silver.tfl_arrivals
      gold_table: nexus.gold.tfl_arrivals_hourly
  gtfs_realtime_events:
    domain: transport
    description: Industry-standard GTFS Realtime feed wrapper for vehicle positions,
      trip updates, or service alerts.
    nexus_demo:
      status: out_of_scope_until_feed_configured
      default_download: false
      reason: No London GTFS Realtime feed URL is configured for the default demo.
    source_type: gtfs_realtime
    source_uri: ${GTFS_REALTIME_URL}
    local_sample_uri: assets/samples/gtfs_realtime_events.csv
    docs_uri: https://gtfs.org/documentation/realtime/
    topic: transport-gtfs
    poll_seconds: 30
    schema_path: domains/transport/schemas/gtfs_realtime_events.schema.json
    freshness_hours: 1
    primary_keys:
    - event_id
    target:
      raw_path: s3a://nexus-lakehouse/raw/gtfs_realtime_events/
      bronze_table: nexus.bronze.gtfs_realtime_events
      silver_table: nexus.silver.gtfs_realtime_events
      gold_table: nexus.gold.gtfs_realtime_events_hourly
  sg_traffic:
    domain: transport
    description: Singapore Data.gov.sg traffic images stream.
    nexus_demo:
      status: deprecated_out_of_scope
      default_download: false
      reason: Not in Greater London; retained only as a reference/sample dataset.
    source_type: api_stream
    source_uri: https://api-open.data.gov.sg/v2/real-time/api/traffic-images
    local_sample_uri: assets/samples/sg_traffic.csv
    docs_uri: https://data.gov.sg/collections/traffic-images/view
    topic: transport-sg-traffic
    poll_seconds: 20
    schema_path: domains/transport/schemas/sg_traffic.schema.json
    freshness_hours: 1
    primary_keys:
    - event_id
    target:
      raw_path: s3a://nexus-lakehouse/raw/sg_traffic/
      bronze_table: nexus.bronze.sg_traffic
      silver_table: nexus.silver.sg_traffic
      gold_table: nexus.gold.sg_traffic_hourly
  stats19_collisions:
    domain: transport
    description: UK road collision records from DfT STATS19 open data (last 5 years).
    nexus_demo:
      status: primary
      default_download: true
      scope: greater_london_after_bronze_filter
      layers:
      - extended_transport_history
      modes:
      - small_demo
      - full_demo
      related_raw_tables:
      - collisions
      - vehicles
      - casualties
    source_type: csv_download
    source_uri: ${STATS19_COLLISIONS_CSV_URL}
    local_sample_uri: assets/samples/stats19_collisions.csv
    docs_uri: https://www.gov.uk/government/statistical-data-sets/road-safety-open-data
    schema_path: domains/transport/schemas/stats19_collisions.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: STATS19
      source_file: assets/source_discovery/schemas/STATS19_schemas.json
      schema_names:
      - STATS19_STATS19_Collision
      - STATS19_STATS19_Casualty
    freshness_hours: 8760
    primary_keys:
    - accident_index
    governance:
      owner: transport-data-platform
      steward: transport-data-steward
      sensitivity: public
      retention:
        policy: open-data-standard
        days: 365
      access_policy:
        allowed_roles:
        - admin
        - steward
        - analyst
        - public
        denied_roles: []
        api_access: true
        trino_access: true
        superset_access: true
    target:
      raw_path: s3a://nexus-lakehouse/raw/stats19_collisions/
      bronze_table: nexus.bronze.stats19_collisions
      silver_table: nexus.silver.stats19_collisions
      gold_table: nexus.gold.stats19_collisions_summary
  naptan_stops:
    domain: transport
    description: National Public Transport Access Nodes for London (ATCO area 490).
    nexus_demo:
      status: primary_reference
      default_download: true
      scope: greater_london
      layers:
      - static_reference
      modes:
      - small_demo
      - full_demo
    source_type: csv_download
    source_uri: ${NAPTAN_ACCESS_NODES_CSV_URL}
    local_sample_uri: assets/samples/naptan_stops.csv
    docs_uri: https://beta-naptan.dft.gov.uk
    schema_path: domains/transport/schemas/naptan_stops.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: NaPTAN
      source_file: assets/source_discovery/schemas/NaPTAN_NPTG_schemas.json
      schema_names:
      - NaPTAN_NPTG_NaPTAN_Stop
    freshness_hours: 8760
    primary_keys:
    - atcocode
    governance:
      owner: transport-data-platform
      steward: transport-data-steward
      sensitivity: public
      retention:
        policy: open-data-standard
        days: 365
      access_policy:
        allowed_roles:
        - admin
        - steward
        - analyst
        - public
        denied_roles: []
        api_access: true
        trino_access: true
        superset_access: true
    target:
      raw_path: s3a://nexus-lakehouse/raw/naptan_stops/
      bronze_table: nexus.bronze.naptan_stops
      silver_table: nexus.silver.naptan_stops
      gold_table: nexus.gold.naptan_stops_summary
  london_journeys:
    domain: transport
    description: TfL public transport journey counts by mode from London Datastore.
    nexus_demo:
      status: primary_aggregate
      default_download: true
      scope: greater_london
      layers:
      - extended_transport_history
      modes:
      - small_demo
      - full_demo
    source_type: csv_download
    source_uri: ${LONDON_PUBLIC_TRANSPORT_JOURNEYS_URL}
    local_sample_uri: assets/samples/london_journeys.csv
    docs_uri: https://data.london.gov.uk
    schema_path: domains/transport/schemas/london_journeys.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: London Datastore
      source_file: assets/source_discovery/schemas/London_Datastore_schemas.json
      schema_names:
      - London_Datastore_London_Datastore_TransportJourneys
    freshness_hours: 8760
    primary_keys:
    - period_beginning
    - period_type
    governance:
      owner: transport-data-platform
      steward: transport-data-steward
      sensitivity: public
      retention:
        policy: open-data-standard
        days: 365
      access_policy:
        allowed_roles:
        - admin
        - steward
        - analyst
        - public
        denied_roles: []
        api_access: true
        trino_access: true
        superset_access: true
    target:
      raw_path: s3a://nexus-lakehouse/raw/london_journeys/
      bronze_table: nexus.bronze.london_journeys
      silver_table: nexus.silver.london_journeys
      gold_table: nexus.gold.london_journeys_summary
  dft_road_traffic:
    domain: transport
    description: DfT road traffic counts (AADF) for London region.
    nexus_demo:
      status: primary
      default_download: true
      scope: london_region
      layers:
      - extended_transport_history
      modes:
      - small_demo
      - full_demo
    source_type: rest_api
    source_uri: ${DFT_ROAD_TRAFFIC_API_BASE_URL}/count-points
    local_sample_uri: assets/samples/dft_road_traffic.csv
    docs_uri: https://roadtraffic.dft.gov.uk/api
    schema_path: domains/transport/schemas/dft_road_traffic.schema.json
    source_discovery:
      repository: https://github.com/Akapi895/data-bigdata
      source: DfT Road Traffic
      source_file: assets/source_discovery/schemas/DfT_Road_Traffic_schemas.json
      schema_names:
      - DfT_Road_Traffic_DfT_CountPoint
      - DfT_Road_Traffic_DfT_TrafficCount
    freshness_hours: 8760
    primary_keys:
    - count_point_id
    - year
    governance:
      owner: transport-data-platform
      steward: transport-data-steward
      sensitivity: public
      retention:
        policy: open-data-standard
        days: 365
      access_policy:
        allowed_roles:
        - admin
        - steward
        - analyst
        - public
        denied_roles: []
        api_access: true
        trino_access: true
        superset_access: true
    target:
      raw_path: s3a://nexus-lakehouse/raw/dft_road_traffic/
      bronze_table: nexus.bronze.dft_road_traffic
      silver_table: nexus.silver.dft_road_traffic
      gold_table: nexus.gold.dft_road_traffic_summary
